<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" aria-label="FIG_005 — exploded view of multi-head attention block in a transformer encoder" role="img" viewBox="0 0 1200 820"><defs><pattern id="paper" width="16" height="16" x="0" y="0" patternUnits="userSpaceOnUse"><circle cx="0" cy="0" r="1" fill="#1a1a1a" fill-opacity=".06"/></pattern><style>.ink{fill:#1a1a1a}.mute{fill:#7a7a78}.bp{fill:#3553ff}.face{fill:rgba(53,83,255,.06)}.face-strong{fill:rgba(53,83,255,.18)}.stroke{stroke:#3553ff;fill:none;stroke-linejoin:miter;stroke-linecap:square}.mono{font-family:&apos;JetBrains Mono&apos;,ui-monospace,Consolas,monospace}</style></defs><rect width="1200" height="820" fill="#fafaf5"/><rect width="1200" height="820" fill="url(#paper)"/><text x="40" y="44" class="mono bp" font-size="11" letter-spacing="2.4">FIG_005</text><text x="1160" y="44" class="mono mute" font-size="11" letter-spacing="2.4" text-anchor="end">PHASE 07 · LESSON 01 · MULTI-HEAD ATTENTION</text><line x1="40" x2="1160" y1="64" y2="64" stroke="#3553ff" stroke-opacity=".35" stroke-width=".6"/><g><text x="0" y="0" class="mono bp" font-size="9" letter-spacing="2" transform="translate(120, 130)">FIG_005.A — INPUT PROJECTIONS</text><g transform="translate(120, 130) translate(40, 30)"><rect width="64" height="22" x="0" y="0" class="face-strong" transform="skewX(-22)"/><rect width="64" height="22" x="0" y="0" stroke-width="1.2" class="stroke" transform="skewX(-22)"/><text x="22" y="14" class="mono bp" font-size="11" letter-spacing="1.6">Q</text><text x="-4" y="46" class="mono mute" font-size="8" letter-spacing="1.4">QUERY</text></g><g transform="translate(120, 130) translate(160, 30)"><rect width="64" height="22" x="0" y="0" class="face-strong" transform="skewX(-22)"/><rect width="64" height="22" x="0" y="0" stroke-width="1.2" class="stroke" transform="skewX(-22)"/><text x="22" y="14" class="mono bp" font-size="11" letter-spacing="1.6">K</text><text x="-4" y="46" class="mono mute" font-size="8" letter-spacing="1.4">KEY</text></g><g transform="translate(120, 130) translate(280, 30)"><rect width="64" height="22" x="0" y="0" class="face-strong" transform="skewX(-22)"/><rect width="64" height="22" x="0" y="0" stroke-width="1.2" class="stroke" transform="skewX(-22)"/><text x="22" y="14" class="mono bp" font-size="11" letter-spacing="1.6">V</text><text x="-4" y="46" class="mono mute" font-size="8" letter-spacing="1.4">VALUE</text></g></g><g><g transform="translate(160, 270) translate(60, 360)"><polygon points="0 0 320 -80 480 -40 160 40" class="face-strong"/><polygon stroke-width="1.4" points="0 0 320 -80 480 -40 160 40" class="stroke"/></g><g transform="translate(160, 270) translate(40, 280)"><polygon points="0 0 320 -80 480 -40 160 40" class="face"/><polygon stroke-width="1.4" points="0 0 320 -80 480 -40 160 40" class="stroke"/></g><g transform="translate(160, 270) translate(20, 200)"><polygon points="0 0 320 -80 480 -40 160 40" class="face"/><polygon stroke-width="1.4" points="0 0 320 -80 480 -40 160 40" class="stroke"/></g><g transform="translate(160, 270) translate(0, 120)"><polygon points="0 0 320 -80 480 -40 160 40" class="face"/><polygon stroke-width="1.4" points="0 0 320 -80 480 -40 160 40" class="stroke"/></g><g stroke-dasharray="3 3" stroke-width=".8" class="stroke" transform="translate(160, 270)"><line x1="500" x2="640" y1="80" y2="-130"/><line x1="520" x2="640" y1="160" y2="-30"/><line x1="540" x2="640" y1="240" y2="70"/><line x1="560" x2="640" y1="320" y2="170"/></g></g><g><g><text x="0" y="0" class="mono bp" font-size="11" letter-spacing="1.8" transform="translate(800, 160) translate(0, 0)">HEAD 1 · LOCAL SYNTAX</text><text x="0" y="16" class="mono mute" font-size="9" letter-spacing="1.2" transform="translate(800, 160) translate(0, 0)">attends to neighbors only</text></g><g><text x="0" y="0" class="mono bp" font-size="11" letter-spacing="1.8" transform="translate(800, 160) translate(0, 100)">HEAD 2 · NOUN-ADJ DEPS</text><text x="0" y="16" class="mono mute" font-size="9" letter-spacing="1.2" transform="translate(800, 160) translate(0, 100)">attends from a noun back to its modifier</text></g><g><text x="0" y="0" class="mono bp" font-size="11" letter-spacing="1.8" transform="translate(800, 160) translate(0, 200)">HEAD 3 · LONG-RANGE COREF</text><text x="0" y="16" class="mono mute" font-size="9" letter-spacing="1.2" transform="translate(800, 160) translate(0, 200)">attends across the sentence to track entities</text></g><g><text x="0" y="0" class="mono bp" font-size="11" letter-spacing="1.8" transform="translate(800, 160) translate(0, 300)">HEAD 4 · OUTPUT POSITION</text><text x="0" y="16" class="mono mute" font-size="9" letter-spacing="1.2" transform="translate(800, 160) translate(0, 300)">attends to the next-token slot</text></g></g><g transform="translate(160, 700)"><text x="0" y="0" class="mono bp" font-size="9" letter-spacing="2">FIG_005.B — OUTPUT</text><rect width="480" height="28" x="0" y="14" class="face"/><rect width="480" height="28" x="0" y="14" stroke-width="1.2" class="stroke"/><text x="14" y="34" class="mono ink" font-size="11" letter-spacing=".8">CONCAT(HEAD₁, HEAD₂, HEAD₃, HEAD₄) · W_O → D_MODEL DIM</text></g><g><text x="0" y="0" class="mono ink" font-size="13" letter-spacing=".6" transform="translate(800, 580)">Attention(Q, K, V)</text><text x="0" y="22" class="mono ink" font-size="13" letter-spacing=".6" transform="translate(800, 580)">= softmax( Q · Kᵀ / √d_k ) · V</text><text x="0" y="44" class="mono mute" font-size="9" letter-spacing="1.4" transform="translate(800, 580)">PER HEAD · D_K = D_MODEL / N_HEADS</text></g><line x1="40" x2="1160" y1="760" y2="760" stroke="#3553ff" stroke-opacity=".35" stroke-width=".6"/><text x="1160" y="788" class="mono mute" font-size="10" letter-spacing="2" text-anchor="end">© FIG_005 · MULTI-HEAD ATTENTION · MIT</text></svg>