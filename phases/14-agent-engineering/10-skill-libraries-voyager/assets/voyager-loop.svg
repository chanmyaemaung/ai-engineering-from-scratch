<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 560"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.curr{fill:#fff1d6;stroke:#c0392b}.curr,.env,.iter,.lib{stroke-width:1.5}.lib{fill:#e6f4ea;stroke:#2e7d32}.iter{fill:#dfe9ff;stroke:#2c5ea9}.env{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="26" class="title" text-anchor="middle">Voyager — automatic curriculum, skill library, iterative refinement</text><rect width="280" height="180" x="40" y="60" class="curr"/><text x="180" y="82" class="head" text-anchor="middle">automatic curriculum</text><text x="60" y="108" class="small">proposes next task from current capability gap</text><text x="60" y="126" class="small">curiosity-driven, bottom-up exploration</text><text x="60" y="146" class="small">&quot;learn to craft iron pickaxe&quot; comes before diamond</text><rect width="240" height="70" x="60" y="158" class="box"/><text x="78" y="178" class="step">production analog:</text><text x="78" y="196" class="small">gap review — what skills missing in library</text><text x="78" y="212" class="small">weekly curriculum pass by human + agent pair</text><rect width="280" height="180" x="340" y="60" class="lib"/><text x="480" y="82" class="head" text-anchor="middle">skill library</text><text x="360" y="108" class="small">skill = named code + description + deps</text><text x="360" y="126" class="small">versioned, retrievable, composable</text><text x="360" y="146" class="small">dedup on write; tag filter on retrieve</text><rect width="240" height="70" x="360" y="158" class="box"/><text x="378" y="178" class="step">2026 production analog:</text><text x="378" y="196" class="small">Claude Agent SDK skills</text><text x="378" y="212" class="small">skillkit registry; MCP resources</text><rect width="280" height="180" x="640" y="60" class="iter"/><text x="780" y="82" class="head" text-anchor="middle">iterative prompting</text><text x="660" y="108" class="small">execution error + env feedback + self-verify</text><text x="660" y="126" class="small">rewrite the skill, bump version</text><text x="660" y="146" class="small">v1 fails to craft; v2 adds stick dep</text><rect width="240" height="70" x="660" y="158" class="box"/><text x="678" y="178" class="step">underpinnings:</text><text x="678" y="196" class="small">Self-Refine (Lesson 05)</text><text x="678" y="212" class="small">CRITIC (Lesson 05) with env verifier</text><rect width="800" height="230" x="80" y="280" class="env"/><text x="480" y="302" class="head" text-anchor="middle">worked loop — craft_iron_pickaxe</text><rect width="760" height="40" x="100" y="320" class="box"/><text x="120" y="342" class="step">1. retrieve: library.search(&quot;need a pickaxe&quot;) returns craft_iron_pickaxe v1</text><rect width="760" height="40" x="100" y="368" class="box"/><text x="120" y="390" class="step">2. execute v1: topo_order place_table mine_ore craft_iron_pickaxe</text><rect width="760" height="40" x="100" y="416" class="box"/><text x="120" y="438" class="step">3. fail: RuntimeError &quot;need 2 stick, have 0&quot; environment feedback surface</text><rect width="760" height="40" x="100" y="464" class="box"/><text x="120" y="486" class="step">4. refine: register v2 with gather_sticks dep; re-execute; success; inventory += iron_pickaxe</text><text x="480" y="540" class="caption" text-anchor="middle">action space = code. skills compose into DAGs. failures bump versions. library grows monotonically.</text></svg>