<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">ColPali — vision-native document RAG with ColBERT late interaction</text><rect width="900" height="230" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">indexing: PDF -&gt; page images -&gt; patch embeddings (cached)</text><rect width="200" height="170" x="50" y="90" class="hot"/><text x="150" y="112" class="step" text-anchor="middle">PDF pages</text><text x="150" y="130" class="small" text-anchor="middle">figures, tables,</text><text x="150" y="146" class="small" text-anchor="middle">layout, fonts</text><text x="150" y="162" class="small" text-anchor="middle">all preserved</text><text x="150" y="182" class="step" text-anchor="middle">no OCR</text><text x="150" y="202" class="small" text-anchor="middle">no text extraction</text><text x="150" y="218" class="small" text-anchor="middle">no chunking</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 255 170 L 295 170"/><rect width="220" height="170" x="300" y="90" class="cool"/><text x="410" y="112" class="step" text-anchor="middle">PaliGemma / Qwen-VL</text><text x="410" y="130" class="small" text-anchor="middle">vision-language encoder</text><text x="410" y="146" class="small" text-anchor="middle">each patch -&gt; D-dim vector</text><text x="410" y="162" class="small" text-anchor="middle">N_p vectors per page</text><text x="410" y="182" class="step" text-anchor="middle">storage</text><text x="410" y="202" class="small" text-anchor="middle">729 x 128 x 4 = 365 KB</text><text x="410" y="218" class="small" text-anchor="middle">PQ compressed ~46 KB</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 525 170 L 565 170"/><rect width="340" height="170" x="570" y="90" class="cold"/><text x="740" y="112" class="step" text-anchor="middle">vector index (all pages)</text><text x="740" y="130" class="small" text-anchor="middle">50-page report -&gt; ~2 MB PQ</text><text x="740" y="146" class="small" text-anchor="middle">1M pages -&gt; ~45 GB PQ</text><text x="740" y="162" class="small" text-anchor="middle">stays on one node</text><text x="740" y="182" class="step" text-anchor="middle">ready for MaxSim query</text><text x="740" y="202" class="small" text-anchor="middle">one table, multi-vector</text><text x="740" y="218" class="small" text-anchor="middle">per-page grouped</text><rect width="900" height="210" x="30" y="300" class="box"/><text x="480" y="322" class="head" text-anchor="middle">retrieval: MaxSim over query tokens and page patches</text><rect width="220" height="160" x="60" y="340" class="reg"/><text x="170" y="362" class="step" text-anchor="middle">query tokens</text><text x="170" y="382" class="small" text-anchor="middle">&quot;Q3 revenue growth&quot;</text><text x="170" y="398" class="small" text-anchor="middle">4-6 token embeddings</text><text x="170" y="416" class="small" text-anchor="middle">same encoder as index</text><text x="170" y="442" class="step" text-anchor="middle">compute at query time</text><text x="170" y="462" class="small" text-anchor="middle">batch with kv cache</text><text x="170" y="482" class="caption" text-anchor="middle">~10 ms per query</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 285 420 L 325 420"/><rect width="290" height="160" x="330" y="340" class="hot"/><text x="475" y="362" class="step" text-anchor="middle">MaxSim = sum over query tokens</text><text x="475" y="378" class="step" text-anchor="middle">of max over patches</text><text x="475" y="398" class="small" text-anchor="middle">each query token &quot;picks&quot; its best patch</text><text x="475" y="414" class="small" text-anchor="middle">selective: irrelevant patches ignored</text><text x="475" y="430" class="small" text-anchor="middle">doc score = sum of those maxes</text><text x="475" y="452" class="step" text-anchor="middle">beats bi-encoder recall</text><text x="475" y="472" class="small" text-anchor="middle">catches chart data, table cells,</text><text x="475" y="488" class="small" text-anchor="middle">figure captions as patches</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 625 420 L 665 420"/><rect width="240" height="160" x="670" y="340" class="cool"/><text x="790" y="362" class="step" text-anchor="middle">top-k pages + VLM answer</text><text x="790" y="382" class="small" text-anchor="middle">send top-3 page images</text><text x="790" y="398" class="small" text-anchor="middle">+ original query</text><text x="790" y="414" class="small" text-anchor="middle">to Qwen2.5-VL or Claude</text><text x="790" y="434" class="step" text-anchor="middle">benchmarks</text><text x="790" y="454" class="small" text-anchor="middle">ViDoRe nDCG@5: ColPali ~80</text><text x="790" y="470" class="small" text-anchor="middle">text-RAG ~55</text><text x="790" y="486" class="small" text-anchor="middle">end-to-end +20-40 pts</text></svg>