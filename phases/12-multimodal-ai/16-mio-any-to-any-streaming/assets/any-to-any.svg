<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">MIO — four modalities, one shared vocabulary, streaming decode</text><rect width="900" height="220" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">four tokenizers, one vocab, one transformer</text><g transform="translate(60, 90)"><rect width="180" height="70" x="0" y="0" class="hot"/><text x="90" y="22" class="step" text-anchor="middle">text</text><text x="90" y="42" class="small" text-anchor="middle">BPE tokenizer</text><text x="90" y="58" class="small" text-anchor="middle">ids 0..31999</text><rect width="180" height="70" x="210" y="0" class="cool"/><text x="300" y="22" class="step" text-anchor="middle">image</text><text x="300" y="42" class="small" text-anchor="middle">SEED-Tokenizer</text><text x="300" y="58" class="small" text-anchor="middle">ids 32000..36095</text><rect width="180" height="70" x="420" y="0" class="cold"/><text x="510" y="22" class="step" text-anchor="middle">speech</text><text x="510" y="42" class="small" text-anchor="middle">SpeechTokenizer RVQ</text><text x="510" y="58" class="small" text-anchor="middle">8 codebook layers</text><rect width="180" height="70" x="630" y="0" class="reg"/><text x="720" y="22" class="step" text-anchor="middle">music</text><text x="720" y="42" class="small" text-anchor="middle">Encodec-class</text><text x="720" y="58" class="small" text-anchor="middle">8192 entries</text></g><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 150 170 L 480 200"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 360 170 L 480 200"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 570 170 L 480 200"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 780 170 L 480 200"/><rect width="280" height="60" x="340" y="200" class="box"/><text x="480" y="222" class="step" text-anchor="middle">one transformer, one NTP loss</text><text x="480" y="240" class="small" text-anchor="middle">~48k vocabulary, text + image + speech + music</text><text x="480" y="256" class="small" text-anchor="middle">streaming friendly: token in, token out</text><rect width="900" height="220" x="30" y="290" class="box"/><text x="480" y="312" class="head" text-anchor="middle">four-stage curriculum + streaming decode path</text><rect width="180" height="170" x="60" y="330" class="hot"/><text x="150" y="352" class="step" text-anchor="middle">Stage 1 alignment</text><text x="150" y="370" class="small" text-anchor="middle">text-image pairs</text><text x="150" y="386" class="small" text-anchor="middle">text-speech pairs</text><text x="150" y="402" class="small" text-anchor="middle">text-music pairs</text><text x="150" y="428" class="step" text-anchor="middle">Stage 2 interleaved</text><text x="150" y="446" class="small" text-anchor="middle">multi-modality docs</text><text x="150" y="462" class="small" text-anchor="middle">cross-modal context</text><text x="150" y="480" class="small" text-anchor="middle">OBELICS + podcast</text><rect width="180" height="170" x="260" y="330" class="cool"/><text x="350" y="352" class="step" text-anchor="middle">Stage 3 speech-rich</text><text x="350" y="370" class="small" text-anchor="middle">extra audio data</text><text x="350" y="386" class="small" text-anchor="middle">speech quality lift</text><text x="350" y="402" class="small" text-anchor="middle">without text regression</text><text x="350" y="428" class="step" text-anchor="middle">Stage 4 SFT</text><text x="350" y="446" class="small" text-anchor="middle">VQA, narration</text><text x="350" y="462" class="small" text-anchor="middle">speech dialogue</text><text x="350" y="480" class="small" text-anchor="middle">any-to-any tasks</text><rect width="460" height="170" x="460" y="330" class="reg"/><text x="690" y="352" class="step" text-anchor="middle">streaming decode path (target &lt;500 ms TTFAB)</text><text x="690" y="372" class="small" text-anchor="middle">mic -&gt; speech tokens (~40 ms)</text><text x="690" y="388" class="small" text-anchor="middle">prefill prompt (~80 ms at 8B)</text><text x="690" y="404" class="small" text-anchor="middle">first output token (~40 ms)</text><text x="690" y="420" class="small" text-anchor="middle">residual-VQ layers 1..7 parallel decode (~30 ms)</text><text x="690" y="436" class="small" text-anchor="middle">speech waveform decoder (~80 ms)</text><text x="690" y="462" class="step" text-anchor="middle">total TTFAB: ~270 ms (GPT-4o-class)</text><text x="690" y="482" class="caption" text-anchor="middle">Moshi 160 ms, MIO 400-500 ms in published traces</text></svg>