<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Long-video understanding — four scaling paths</text><rect width="440" height="210" x="30" y="50" class="hot"/><text x="250" y="72" class="head" text-anchor="middle">Path 1: brute context</text><text x="250" y="96" class="small" text-anchor="middle">Gemini 1.5 Pro: 1M tokens</text><text x="250" y="114" class="small" text-anchor="middle">Gemini 2.5 Pro: 10M+ tokens</text><text x="250" y="132" class="small" text-anchor="middle">Claude Opus 4.7: 1M tokens</text><text x="250" y="160" class="step" text-anchor="middle">engineering</text><text x="250" y="180" class="small" text-anchor="middle">custom attention hierarchy</text><text x="250" y="196" class="small" text-anchor="middle">MoE expert routing</text><text x="250" y="212" class="small" text-anchor="middle">closed-source</text><text x="250" y="240" class="caption" text-anchor="middle">best recall, closed only</text><rect width="440" height="210" x="490" y="50" class="cool"/><text x="710" y="72" class="head" text-anchor="middle">Path 2: ring attention</text><text x="710" y="96" class="small" text-anchor="middle">LWM: 1M-token training</text><text x="710" y="114" class="small" text-anchor="middle">LongVILA: 1400-frame videos</text><text x="710" y="132" class="small" text-anchor="middle">distributed ring pattern</text><text x="710" y="160" class="step" text-anchor="middle">engineering</text><text x="710" y="180" class="small" text-anchor="middle">each device holds chunk</text><text x="710" y="196" class="small" text-anchor="middle">rotates for attention passes</text><text x="710" y="212" class="small" text-anchor="middle">open-source</text><text x="710" y="240" class="caption" text-anchor="middle">good open scaling, heavy compute</text><rect width="440" height="230" x="30" y="280" class="cold"/><text x="250" y="302" class="head" text-anchor="middle">Path 3: token compression</text><text x="250" y="326" class="small" text-anchor="middle">Video-XL: one summary token</text><text x="250" y="344" class="small" text-anchor="middle">per clip (100s of frames -&gt; 1)</text><text x="250" y="362" class="small" text-anchor="middle">LongVA: long-context transfer</text><text x="250" y="380" class="small" text-anchor="middle">VideoChat2: hierarchical pool</text><text x="250" y="410" class="step" text-anchor="middle">engineering</text><text x="250" y="430" class="small" text-anchor="middle">learned compressor pre-LLM</text><text x="250" y="446" class="small" text-anchor="middle">trades recall for scale</text><text x="250" y="462" class="small" text-anchor="middle">~32k context sufficient</text><text x="250" y="490" class="caption" text-anchor="middle">cheapest inference, weakest grounding</text><rect width="440" height="230" x="490" y="280" class="reg"/><text x="710" y="302" class="head" text-anchor="middle">Path 4: agentic retrieval</text><text x="710" y="326" class="small" text-anchor="middle">VideoAgent: LLM as query planner</text><text x="710" y="344" class="small" text-anchor="middle">tool: find_clips(keyword)</text><text x="710" y="362" class="small" text-anchor="middle">VLM reads only matches</text><text x="710" y="380" class="small" text-anchor="middle">LLM composes final answer</text><text x="710" y="410" class="step" text-anchor="middle">engineering</text><text x="710" y="430" class="small" text-anchor="middle">retrieval quality is the bottleneck</text><text x="710" y="446" class="small" text-anchor="middle">99% cheaper for single-event queries</text><text x="710" y="462" class="small" text-anchor="middle">worse for holistic understanding</text><text x="710" y="490" class="caption" text-anchor="middle">best for 2h+ specific queries</text></svg>