<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Transfusion — one transformer, two losses, hybrid attention mask</text><rect width="900" height="240" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">forward pass, two loss heads</text><rect width="260" height="180" x="60" y="90" class="hot"/><text x="190" y="112" class="step" text-anchor="middle">text tokens</text><text x="190" y="132" class="small" text-anchor="middle">discrete BPE vocab</text><text x="190" y="150" class="small" text-anchor="middle">causal attention</text><text x="190" y="168" class="small" text-anchor="middle">teacher forcing</text><text x="190" y="194" class="step" text-anchor="middle">loss: cross-entropy</text><text x="190" y="216" class="small" text-anchor="middle">next-token prediction</text><text x="190" y="232" class="small" text-anchor="middle">vocab-logits head</text><text x="190" y="258" class="caption" text-anchor="middle">same as any LLM</text><rect width="260" height="180" x="350" y="90" class="cool"/><text x="480" y="112" class="step" text-anchor="middle">shared transformer body</text><text x="480" y="132" class="small" text-anchor="middle">one weight set</text><text x="480" y="150" class="small" text-anchor="middle">block-triangular mask</text><text x="480" y="168" class="small" text-anchor="middle">both modalities in</text><text x="480" y="186" class="small" text-anchor="middle">one forward pass</text><text x="480" y="218" class="step" text-anchor="middle">gradient mixes</text><text x="480" y="236" class="small" text-anchor="middle">text and image objectives</text><text x="480" y="254" class="caption" text-anchor="middle">shared body, two heads</text><rect width="260" height="180" x="640" y="90" class="cold"/><text x="770" y="112" class="step" text-anchor="middle">image patches</text><text x="770" y="132" class="small" text-anchor="middle">continuous vectors</text><text x="770" y="150" class="small" text-anchor="middle">bidirectional attention</text><text x="770" y="168" class="small" text-anchor="middle">within image block</text><text x="770" y="194" class="step" text-anchor="middle">loss: MSE on velocity</text><text x="770" y="216" class="small" text-anchor="middle">flow-matching diffusion</text><text x="770" y="232" class="small" text-anchor="middle">predict noise -&gt; data</text><text x="770" y="258" class="caption" text-anchor="middle">SD3 MMDiT sibling</text><rect width="900" height="200" x="30" y="310" class="box"/><text x="480" y="332" class="head" text-anchor="middle">hybrid attention mask for [T T &lt;image&gt; P P P P &lt;/image&gt; T T]</text><g transform="translate(200, 350)"><rect width="18" height="18" x="0" y="0" class="hot"/><rect width="18" height="18" x="20" y="0" class="hot"/><rect width="18" height="18" x="40" y="0" class="box"/><rect width="18" height="18" x="60" y="0" class="cold"/><rect width="18" height="18" x="80" y="0" class="cold"/><rect width="18" height="18" x="100" y="0" class="cold"/><rect width="18" height="18" x="120" y="0" class="cold"/><rect width="18" height="18" x="140" y="0" class="box"/><rect width="18" height="18" x="160" y="0" class="hot"/><rect width="18" height="18" x="180" y="0" class="hot"/><text x="9" y="35" class="small" text-anchor="middle">T</text><text x="29" y="35" class="small" text-anchor="middle">T</text><text x="49" y="35" class="small" text-anchor="middle">&lt;I&gt;</text><text x="69" y="35" class="small" text-anchor="middle">P</text><text x="89" y="35" class="small" text-anchor="middle">P</text><text x="109" y="35" class="small" text-anchor="middle">P</text><text x="129" y="35" class="small" text-anchor="middle">P</text><text x="149" y="35" class="small" text-anchor="middle">&lt;/I&gt;</text><text x="169" y="35" class="small" text-anchor="middle">T</text><text x="189" y="35" class="small" text-anchor="middle">T</text></g><rect width="490" height="160" x="420" y="340" class="reg"/><text x="665" y="362" class="step" text-anchor="middle">mask rules</text><text x="665" y="384" class="small" text-anchor="middle">1. text-to-text: causal (triangular)</text><text x="665" y="402" class="small" text-anchor="middle">2. patch-to-patch: full bidirectional within image</text><text x="665" y="420" class="small" text-anchor="middle">3. text-to-prior-image: attend fully</text><text x="665" y="438" class="small" text-anchor="middle">4. image-to-prior-text: attend fully</text><text x="665" y="460" class="small" text-anchor="middle">5. no image-to-later-text (causal block)</text><text x="665" y="480" class="caption" text-anchor="middle">implemented as a single block-triangular mask</text></svg>