<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Embodied VLAs — RT-2 to GR00T, the action-format arc</text><rect width="900" height="210" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">four action formats in use today</text><rect width="200" height="160" x="50" y="90" class="hot"/><text x="150" y="110" class="step" text-anchor="middle">discrete 256-bin</text><text x="150" y="128" class="small" text-anchor="middle">RT-2 (2023), OpenVLA</text><text x="150" y="146" class="small" text-anchor="middle">one token per DOF</text><text x="150" y="162" class="small" text-anchor="middle">text-vocab compatible</text><text x="150" y="186" class="step" text-anchor="middle">pros: simple</text><text x="150" y="206" class="small" text-anchor="middle">cons: ~300 tok/s needed</text><text x="150" y="224" class="small" text-anchor="middle">inference 3-5 Hz</text><rect width="200" height="160" x="270" y="90" class="cool"/><text x="370" y="110" class="step" text-anchor="middle">FAST (DCT + quantize)</text><text x="370" y="128" class="small" text-anchor="middle">2024 improvement</text><text x="370" y="146" class="small" text-anchor="middle">~10 tokens / trajectory</text><text x="370" y="162" class="small" text-anchor="middle">low-freq coefficients</text><text x="370" y="186" class="step" text-anchor="middle">pros: 3-5x faster</text><text x="370" y="206" class="small" text-anchor="middle">cons: loses high-freq</text><text x="370" y="224" class="small" text-anchor="middle">used by pi0-FAST</text><rect width="200" height="160" x="490" y="90" class="cold"/><text x="590" y="110" class="step" text-anchor="middle">flow-matching head</text><text x="590" y="128" class="small" text-anchor="middle">pi0 (2024)</text><text x="590" y="146" class="small" text-anchor="middle">continuous output</text><text x="590" y="162" class="small" text-anchor="middle">50-step trajectory</text><text x="590" y="186" class="step" text-anchor="middle">pros: smoothness</text><text x="590" y="206" class="small" text-anchor="middle">5 denoise steps</text><text x="590" y="224" class="small" text-anchor="middle">~50 Hz control</text><rect width="200" height="160" x="710" y="90" class="reg"/><text x="810" y="110" class="step" text-anchor="middle">dual-system</text><text x="810" y="128" class="small" text-anchor="middle">GR00T N1 (2025)</text><text x="810" y="146" class="small" text-anchor="middle">System 2: VLM ~1 Hz</text><text x="810" y="162" class="small" text-anchor="middle">System 1: small ~100 Hz</text><text x="810" y="186" class="step" text-anchor="middle">pros: humanoid-scale</text><text x="810" y="206" class="small" text-anchor="middle">subgoals + fast control</text><text x="810" y="224" class="small" text-anchor="middle">best for 30+ DOF</text><rect width="900" height="230" x="30" y="280" class="box"/><text x="480" y="302" class="head" text-anchor="middle">training recipe + safety</text><rect width="260" height="180" x="60" y="320" class="cool"/><text x="190" y="342" class="step" text-anchor="middle">co-fine-tune</text><text x="190" y="362" class="small" text-anchor="middle">ratio ~0.5:1 to 1:1</text><text x="190" y="378" class="small" text-anchor="middle">web VQA + robot demos</text><text x="190" y="396" class="small" text-anchor="middle">preserves general knowledge</text><text x="190" y="416" class="small" text-anchor="middle">robot-only -&gt; forgets lang</text><text x="190" y="436" class="step" text-anchor="middle">fine-tune path</text><text x="190" y="456" class="small" text-anchor="middle">LoRA on 100-1000 demos</text><text x="190" y="472" class="small" text-anchor="middle">to adapt to new robot</text><rect width="260" height="180" x="340" y="320" class="reg"/><text x="470" y="342" class="step" text-anchor="middle">Open X-Embodiment</text><text x="470" y="362" class="small" text-anchor="middle">22 datasets</text><text x="470" y="378" class="small" text-anchor="middle">1M trajectories</text><text x="470" y="394" class="small" text-anchor="middle">22 robot embodiments</text><text x="470" y="412" class="small" text-anchor="middle">ALOHA / Bridge / Droid</text><text x="470" y="432" class="step" text-anchor="middle">unified schema</text><text x="470" y="452" class="small" text-anchor="middle">state, camera, action</text><text x="470" y="468" class="small" text-anchor="middle">open-source</text><rect width="290" height="180" x="620" y="320" class="hot"/><text x="765" y="342" class="step" text-anchor="middle">safety gates (outside VLA)</text><text x="765" y="362" class="small" text-anchor="middle">hard joint limits</text><text x="765" y="378" class="small" text-anchor="middle">velocity clipping</text><text x="765" y="394" class="small" text-anchor="middle">workspace bounds</text><text x="765" y="410" class="small" text-anchor="middle">HITL approval for novel tasks</text><text x="765" y="436" class="step" text-anchor="middle">VLA suggests, controller enforces</text><text x="765" y="462" class="caption" text-anchor="middle">always treat VLA output as prior,</text><text x="765" y="478" class="caption" text-anchor="middle">not a command</text></svg>