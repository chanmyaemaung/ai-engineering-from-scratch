<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 560"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.frozen{fill:#dfe9ff;stroke:#2c5ea9;stroke-dasharray:4 3}.frozen,.stage,.train{stroke-width:1.5}.train{fill:#fff1d6;stroke:#c0392b}.stage{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">LLaVA recipe — simpler projector, cheaper training, bigger ecosystem</text><rect width="880" height="250" x="40" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">forward pass: image -&gt; projector -&gt; LLM</text><rect width="160" height="180" x="60" y="90" class="frozen"/><text x="140" y="112" class="step" text-anchor="middle">CLIP ViT-L/14</text><text x="140" y="130" class="small" text-anchor="middle">@ 336x336</text><text x="140" y="148" class="small" text-anchor="middle">frozen stage 1</text><text x="140" y="166" class="small" text-anchor="middle">303M params</text><text x="140" y="194" class="small" text-anchor="middle">576 patch tokens</text><text x="140" y="212" class="small" text-anchor="middle">dim 1024 each</text><text x="140" y="240" class="caption" text-anchor="middle">24x24 grid</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 225 180 L 290 180"/><rect width="180" height="180" x="295" y="90" class="train"/><text x="385" y="112" class="step" text-anchor="middle">2-layer MLP projector</text><text x="385" y="130" class="small" text-anchor="middle">1024 -&gt; 4096 -&gt; 4096</text><text x="385" y="148" class="small" text-anchor="middle">GELU activation</text><text x="385" y="168" class="small" text-anchor="middle">~22M params</text><text x="385" y="196" class="small" text-anchor="middle">shared across all patches</text><text x="385" y="214" class="small" text-anchor="middle">trained in stage 1</text><text x="385" y="232" class="small" text-anchor="middle">fine-tuned in stage 2</text><text x="385" y="252" class="caption" text-anchor="middle">the whole bridge</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 480 180 L 545 180"/><rect width="160" height="180" x="550" y="90" class="box"/><text x="630" y="112" class="step" text-anchor="middle">576 visual tokens</text><text x="630" y="130" class="small" text-anchor="middle">each dim 4096</text><text x="630" y="148" class="small" text-anchor="middle">replaces &lt;image&gt;</text><text x="630" y="166" class="small" text-anchor="middle">in the text prompt</text><text x="630" y="194" class="small" text-anchor="middle">token budget:</text><text x="630" y="212" class="small" text-anchor="middle">576 / 2048 = 28%</text><text x="630" y="230" class="small" text-anchor="middle">576 / 32k = 1.8%</text><text x="630" y="252" class="small" text-anchor="middle">AnyRes: 2880 tokens</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 715 180 L 780 180"/><rect width="130" height="180" x="785" y="90" class="frozen"/><text x="850" y="112" class="step" text-anchor="middle">Vicuna 13B</text><text x="850" y="130" class="small" text-anchor="middle">or Llama-3.1</text><text x="850" y="150" class="small" text-anchor="middle">frozen stage 1</text><text x="850" y="170" class="small" text-anchor="middle">trained stage 2</text><text x="850" y="200" class="small" text-anchor="middle">autoregressive</text><text x="850" y="218" class="small" text-anchor="middle">next-token</text><text x="850" y="236" class="small" text-anchor="middle">generation</text><text x="850" y="256" class="caption" text-anchor="middle">same as text-only</text><rect width="880" height="220" x="40" y="320" class="box"/><text x="480" y="342" class="head" text-anchor="middle">two-stage training</text><rect width="410" height="160" x="60" y="360" class="stage"/><text x="80" y="382" class="step">Stage 1: projector alignment</text><text x="80" y="402" class="small">freeze ViT, freeze LLM</text><text x="80" y="418" class="small">train ONLY the 2-layer MLP</text><text x="80" y="434" class="small">data: 558k caption pairs (LAION-CC-SBU)</text><text x="80" y="450" class="small">loss: LM on caption, conditioned on visual tokens</text><text x="80" y="468" class="small">cost: ~4 hours on 8xA100</text><text x="80" y="490" class="small">goal: projector learns ViT-space -&gt; LLM-space</text><text x="80" y="508" class="caption">no task-specific objectives</text><rect width="410" height="160" x="490" y="360" class="train"/><text x="510" y="382" class="step">Stage 2: visual instruction tuning</text><text x="510" y="402" class="small">unfreeze LLM (full or LoRA)</text><text x="510" y="418" class="small">keep projector trainable</text><text x="510" y="434" class="small">data: 158k GPT-4-generated turns</text><text x="510" y="450" class="small">(conversation / description / reasoning)</text><text x="510" y="468" class="small">cost: ~20 hours on 8xA100</text><text x="510" y="490" class="small">goal: dialog, VQA, instruction following</text><text x="510" y="508" class="caption">LLaVA-NeXT adds ShareGPT4V, academic mix</text></svg>