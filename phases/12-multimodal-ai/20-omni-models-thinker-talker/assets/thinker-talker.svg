<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Thinker-Talker — streaming pipeline for real-time voice</text><rect width="900" height="230" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">parallel streaming: Thinker and Talker run concurrently</text><rect width="140" height="170" x="60" y="90" class="hot"/><text x="130" y="112" class="step" text-anchor="middle">user audio</text><text x="130" y="130" class="small" text-anchor="middle">mic 16 kHz</text><text x="130" y="146" class="small" text-anchor="middle">+ webcam 4 fps</text><text x="130" y="166" class="small" text-anchor="middle">streaming</text><text x="130" y="186" class="small" text-anchor="middle">tokens in</text><text x="130" y="212" class="caption" text-anchor="middle">VAD for turn-taking</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 205 170 L 245 170"/><rect width="210" height="170" x="250" y="90" class="cool"/><text x="355" y="112" class="step" text-anchor="middle">Thinker (7-80B)</text><text x="355" y="130" class="small" text-anchor="middle">text-generating</text><text x="355" y="146" class="small" text-anchor="middle">large LLM reasoning</text><text x="355" y="162" class="small" text-anchor="middle">TMRoPE timestamps</text><text x="355" y="180" class="small" text-anchor="middle">emits text tokens</text><text x="355" y="202" class="step" text-anchor="middle">first token ~40ms</text><text x="355" y="224" class="caption" text-anchor="middle">streams per token</text><text x="355" y="240" class="caption" text-anchor="middle">into Talker</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 465 170 L 505 170"/><rect width="210" height="170" x="510" y="90" class="cold"/><text x="615" y="112" class="step" text-anchor="middle">Talker (200M-1B)</text><text x="615" y="130" class="small" text-anchor="middle">speech-generating</text><text x="615" y="146" class="small" text-anchor="middle">small + fast</text><text x="615" y="162" class="small" text-anchor="middle">residual-VQ output</text><text x="615" y="180" class="small" text-anchor="middle">8 codebooks</text><text x="615" y="202" class="step" text-anchor="middle">50 tok/s throughput</text><text x="615" y="224" class="caption" text-anchor="middle">keeps pace with speech</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 725 170 L 765 170"/><rect width="140" height="170" x="770" y="90" class="reg"/><text x="840" y="112" class="step" text-anchor="middle">waveform</text><text x="840" y="130" class="small" text-anchor="middle">SNAC decoder</text><text x="840" y="146" class="small" text-anchor="middle">16 kHz samples</text><text x="840" y="162" class="small" text-anchor="middle">speaker output</text><text x="840" y="182" class="step" text-anchor="middle">~70 ms decode</text><text x="840" y="206" class="caption" text-anchor="middle">streaming</text><rect width="900" height="220" x="30" y="300" class="box"/><text x="480" y="322" class="head" text-anchor="middle">TTFAB budget and open implementations</text><g transform="translate(60, 350)"><text x="0" y="15" class="step">mic -&gt; audio tokens</text><rect width="50" height="16" x="200" y="2" class="hot"/><text x="260" y="15" class="small">40 ms</text><text x="0" y="40" class="step">Thinker prefill</text><rect width="120" height="16" x="200" y="27" class="cool"/><text x="330" y="40" class="small">100 ms at 7B</text><text x="0" y="65" class="step">first text token</text><rect width="45" height="16" x="200" y="52" class="cool"/><text x="255" y="65" class="small">40 ms</text><text x="0" y="90" class="step">Talker first tokens</text><rect width="20" height="16" x="200" y="77" class="cold"/><text x="230" y="90" class="small">20 ms</text><text x="0" y="115" class="step">RVQ + waveform</text><rect width="100" height="16" x="200" y="102" class="reg"/><text x="310" y="115" class="small">100 ms</text></g><rect width="320" height="160" x="590" y="340" class="reg"/><text x="750" y="362" class="step" text-anchor="middle">open implementations</text><text x="750" y="384" class="small" text-anchor="middle">Mini-Omni : first open streaming</text><text x="750" y="402" class="small" text-anchor="middle">Moshi : 160 ms, inner monologue</text><text x="750" y="420" class="small" text-anchor="middle">Qwen2.5-Omni : ~350 ms, TMRoPE</text><text x="750" y="438" class="small" text-anchor="middle">Qwen3-Omni : close to GPT-4o</text><text x="750" y="456" class="small" text-anchor="middle">GLM-4-Voice : Chinese-first</text><text x="750" y="480" class="caption" text-anchor="middle">GPT-4o reference: ~250 ms</text></svg>