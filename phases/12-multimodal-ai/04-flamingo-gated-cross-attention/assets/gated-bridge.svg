<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 560"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.frozen{fill:#dfe9ff;stroke:#2c5ea9;stroke-dasharray:4 3}.cool,.frozen,.gate,.train{stroke-width:1.5}.train{fill:#fff1d6;stroke:#c0392b}.gate{fill:#e9e6ff;stroke:#5a4fcf}.cool{fill:#e6f4ea;stroke:#2e7d32}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Flamingo — gated cross-attention inside a frozen 70B Chinchilla LLM</text><rect width="220" height="480" x="40" y="50" class="box"/><text x="150" y="72" class="head" text-anchor="middle">image / video pipeline</text><rect width="180" height="50" x="60" y="92" class="frozen"/><text x="150" y="114" class="step" text-anchor="middle">frozen ViT</text><text x="150" y="130" class="small" text-anchor="middle">196-900 patches / image</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 150 148 L 150 172"/><rect width="180" height="100" x="60" y="180" class="train"/><text x="150" y="202" class="step" text-anchor="middle">Perceiver resampler</text><text x="150" y="220" class="small" text-anchor="middle">K=64 learnable latents</text><text x="150" y="238" class="small" text-anchor="middle">cross-attn over patches</text><text x="150" y="256" class="small" text-anchor="middle">6 blocks, 64M params</text><text x="150" y="272" class="small" text-anchor="middle">fixed 64 tokens out</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 150 288 L 150 318"/><rect width="180" height="60" x="60" y="328" class="cool"/><text x="150" y="350" class="step" text-anchor="middle">64 visual tokens</text><text x="150" y="368" class="small" text-anchor="middle">per image (or per video)</text><rect width="180" height="110" x="60" y="408" class="box"/><text x="150" y="428" class="head" text-anchor="middle">variable inputs</text><text x="150" y="448" class="small" text-anchor="middle">image: 196 patches -&gt; 64</text><text x="150" y="464" class="small" text-anchor="middle">high-res: 900 patches -&gt; 64</text><text x="150" y="482" class="small" text-anchor="middle">video: T * 64</text><text x="150" y="500" class="small" text-anchor="middle">output shape: always K=64</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 265 350 L 340 350"/><rect width="570" height="480" x="345" y="50" class="box"/><text x="630" y="72" class="head" text-anchor="middle">frozen LLM with inserted gated cross-attn</text><rect width="530" height="52" x="365" y="92" class="frozen"/><text x="630" y="114" class="step" text-anchor="middle">LLM self-attn + FFN (block 1-4)</text><text x="630" y="132" class="small" text-anchor="middle">frozen Chinchilla 70B layers</text><rect width="530" height="80" x="365" y="154" class="gate"/><text x="630" y="176" class="step" text-anchor="middle">GATED CROSS-ATTENTION (trained)</text><text x="390" y="200" class="small">y = tanh(alpha) * cross_attn(text, visual_tokens) + x</text><text x="390" y="218" class="small">alpha init 0 -&gt; tanh(0) = 0 -&gt; output == input</text><text x="390" y="234" class="small">-&gt; LLM text capability preserved at step 0</text><rect width="530" height="52" x="365" y="244" class="frozen"/><text x="630" y="266" class="step" text-anchor="middle">LLM self-attn + FFN (block 5-8)</text><text x="630" y="284" class="small" text-anchor="middle">text tokens continue causal self-attention</text><rect width="530" height="80" x="365" y="306" class="gate"/><text x="630" y="328" class="step" text-anchor="middle">GATED CROSS-ATTENTION (trained)</text><text x="390" y="352" class="small">as alpha increases, visual contribution mixes in</text><text x="390" y="370" class="small">ends training with alpha O(1-2), tanh ~0.8</text><text x="390" y="386" class="caption">inserted every M=4 LLM layers</text><rect width="530" height="52" x="365" y="396" class="frozen"/><text x="630" y="418" class="step" text-anchor="middle">LLM self-attn + FFN (block 9-12, ..., N)</text><rect width="530" height="60" x="365" y="458" class="cool"/><text x="630" y="478" class="step" text-anchor="middle">total cross-attn layers: N/4</text><text x="630" y="496" class="small" text-anchor="middle">for 70B LLM with 80 layers -&gt; 20 gated bridges</text><text x="630" y="510" class="small" text-anchor="middle">trained params: ~10B / 80B total</text></svg>