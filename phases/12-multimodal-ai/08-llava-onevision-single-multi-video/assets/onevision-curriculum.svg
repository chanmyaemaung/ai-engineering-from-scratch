<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.reg{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.reg{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">LLaVA-OneVision — unified token budget and three-stage curriculum</text><rect width="900" height="200" x="30" y="50" class="box"/><text x="480" y="72" class="head" text-anchor="middle">shared visual-token budget ~4000 across three scenarios</text><rect width="260" height="140" x="60" y="90" class="hot"/><text x="190" y="110" class="step" text-anchor="middle">single-image</text><text x="190" y="130" class="small" text-anchor="middle">AnyRes 9 tiles + thumbnail</text><text x="190" y="146" class="small" text-anchor="middle">each tile 384, 2x pool</text><text x="190" y="162" class="small" text-anchor="middle">182 tokens per tile</text><text x="190" y="182" class="step" text-anchor="middle">total 1820 tokens</text><text x="190" y="202" class="small" text-anchor="middle">perception + OCR + detail</text><rect width="260" height="140" x="340" y="90" class="cool"/><text x="470" y="110" class="step" text-anchor="middle">multi-image</text><text x="470" y="130" class="small" text-anchor="middle">6 images at 384</text><text x="470" y="146" class="small" text-anchor="middle">no pooling, 729 per image</text><text x="470" y="162" class="small" text-anchor="middle">cross-image reasoning</text><text x="470" y="182" class="step" text-anchor="middle">total 4374 tokens</text><text x="470" y="202" class="small" text-anchor="middle">compare, count, diff</text><rect width="280" height="140" x="620" y="90" class="cold"/><text x="760" y="110" class="step" text-anchor="middle">video</text><text x="760" y="130" class="small" text-anchor="middle">32 frames at 384</text><text x="760" y="146" class="small" text-anchor="middle">3x pool -&gt; 81 per frame</text><text x="760" y="162" class="small" text-anchor="middle">temporal grounding</text><text x="760" y="182" class="step" text-anchor="middle">total 2592 tokens</text><text x="760" y="202" class="small" text-anchor="middle">events, action recog</text><rect width="900" height="250" x="30" y="270" class="box"/><text x="480" y="292" class="head" text-anchor="middle">three-stage curriculum + emergent skills</text><rect width="200" height="190" x="60" y="310" class="reg"/><text x="160" y="332" class="step" text-anchor="middle">Stage SI</text><text x="160" y="354" class="small" text-anchor="middle">single-image only</text><text x="160" y="370" class="small" text-anchor="middle">AnyRes high-res</text><text x="160" y="390" class="small" text-anchor="middle">perception base</text><text x="160" y="410" class="small" text-anchor="middle">MMMU + OCR + detail</text><text x="160" y="444" class="caption" text-anchor="middle">reverse order (video first)</text><text x="160" y="460" class="caption" text-anchor="middle">loses 2-4 MMMU</text><text x="160" y="476" class="caption" text-anchor="middle">per OneVision ablation</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 265 410 L 325 410"/><rect width="200" height="190" x="330" y="310" class="cool"/><text x="430" y="332" class="step" text-anchor="middle">Stage OV</text><text x="430" y="354" class="small" text-anchor="middle">50% single</text><text x="430" y="370" class="small" text-anchor="middle">30% multi-image</text><text x="430" y="390" class="small" text-anchor="middle">20% video</text><text x="430" y="410" class="small" text-anchor="middle">unified budget</text><text x="430" y="444" class="caption" text-anchor="middle">cross-scenario alignment</text><text x="430" y="460" class="caption" text-anchor="middle">structural reasoning</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M 535 410 L 595 410"/><rect width="200" height="190" x="600" y="310" class="hot"/><text x="700" y="332" class="step" text-anchor="middle">Stage TT</text><text x="700" y="354" class="small" text-anchor="middle">task-specific mix</text><text x="700" y="370" class="small" text-anchor="middle">e.g., agent / doc</text><text x="700" y="390" class="small" text-anchor="middle">/ robotics / video</text><text x="700" y="410" class="small" text-anchor="middle">deployment tune</text><text x="700" y="444" class="caption" text-anchor="middle">optional, preserves base</text><rect width="100" height="190" x="820" y="310" class="reg"/><text x="870" y="332" class="step" text-anchor="middle">emergent</text><text x="870" y="354" class="small" text-anchor="middle">multi-camera</text><text x="870" y="370" class="small" text-anchor="middle">reasoning</text><text x="870" y="390" class="small" text-anchor="middle">set-of-mark</text><text x="870" y="406" class="small" text-anchor="middle">prompt</text><text x="870" y="426" class="small" text-anchor="middle">iPhone screen</text><text x="870" y="442" class="small" text-anchor="middle">agent</text><text x="870" y="476" class="caption" text-anchor="middle">none trained</text></svg>