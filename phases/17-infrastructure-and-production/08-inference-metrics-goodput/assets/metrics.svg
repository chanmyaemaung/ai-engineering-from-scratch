<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 540"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.dsk{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.dsk{fill:#e9e6ff;stroke:#5a4fcf}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}</style></defs><text x="480" y="24" class="title" text-anchor="middle">Inference metrics — throughput lies, goodput tells the truth</text><rect width="440" height="230" x="40" y="50" class="box"/><text x="260" y="72" class="head" text-anchor="middle">the four latencies</text><rect width="400" height="35" x="60" y="90" class="cool"/><text x="260" y="112" class="step" text-anchor="middle">TTFT = queue + network + prefill</text><rect width="400" height="35" x="60" y="130" class="cold"/><text x="260" y="152" class="step" text-anchor="middle">TPOT / ITL = decode per token after first</text><rect width="400" height="35" x="60" y="170" class="dsk"/><text x="260" y="192" class="step" text-anchor="middle">E2E = TTFT + TPOT * output_len</text><rect width="400" height="35" x="60" y="210" class="hot"/><text x="260" y="232" class="step" text-anchor="middle">throughput = total_tokens / elapsed</text><text x="260" y="263" class="caption" text-anchor="middle">throughput is a fleet metric, not a user metric</text><rect width="420" height="230" x="500" y="50" class="box"/><text x="710" y="72" class="head" text-anchor="middle">goodput — the SLO gate</text><rect width="380" height="115" x="520" y="90" class="cool"/><text x="710" y="112" class="step" text-anchor="middle">goodput = P[ all SLO constraints held ]</text><text x="710" y="132" class="small" text-anchor="middle">TTFT P99 &lt;= a AND</text><text x="710" y="150" class="small" text-anchor="middle">TPOT P99 &lt;= b AND</text><text x="710" y="168" class="small" text-anchor="middle">E2E P99 &lt;= c</text><text x="710" y="190" class="small" text-anchor="middle">a request is &quot;good&quot; only if every bound held</text><rect width="380" height="55" x="520" y="215" class="hot"/><text x="710" y="237" class="step" text-anchor="middle">target : goodput &gt;= 99%</text><text x="710" y="256" class="small" text-anchor="middle">used in MLPerf Inference v6.0 submissions</text><rect width="440" height="230" x="40" y="300" class="box"/><text x="260" y="322" class="head" text-anchor="middle">percentiles — never mean alone</text><rect width="400" height="35" x="60" y="340" class="cool"/><text x="260" y="362" class="step" text-anchor="middle">always P50, P90, P99</text><rect width="400" height="35" x="60" y="380" class="cold"/><text x="260" y="402" class="step" text-anchor="middle">LLM distributions are right-skewed</text><rect width="400" height="35" x="60" y="420" class="hot"/><text x="260" y="442" class="step" text-anchor="middle">mean TPOT 7 ms can hide P99 of 40 ms</text><rect width="400" height="55" x="60" y="460" class="dsk"/><text x="260" y="482" class="step" text-anchor="middle">reference (Llama-3.1-8B on TRT-LLM, 2026)</text><text x="260" y="500" class="small" text-anchor="middle">TTFT 162 ms, TPOT 7.33 ms, E2E 1093 ms (mean)</text><rect width="420" height="230" x="500" y="300" class="box"/><text x="710" y="322" class="head" text-anchor="middle">measurement trap</text><rect width="380" height="50" x="520" y="340" class="hot"/><text x="710" y="362" class="step" text-anchor="middle">GenAI-Perf vs LLMPerf</text><text x="710" y="380" class="small" text-anchor="middle">same run, different TPOT</text><rect width="380" height="55" x="520" y="395" class="cool"/><text x="710" y="417" class="step" text-anchor="middle">GenAI-Perf (NVIDIA)</text><text x="710" y="435" class="small" text-anchor="middle">ITL excludes TTFT ; starts from token 2</text><rect width="380" height="55" x="520" y="455" class="cold"/><text x="710" y="477" class="step" text-anchor="middle">LLMPerf (Ray / Anyscale)</text><text x="710" y="495" class="small" text-anchor="middle">ITL includes TTFT ; starts from token 1</text><text x="710" y="522" class="caption" text-anchor="middle">state tool + version in every report</text></svg>