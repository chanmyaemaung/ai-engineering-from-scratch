<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 560"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.dsk{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.dsk{fill:#e9e6ff;stroke:#5a4fcf}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.small{font-size:10px;fill:#555}</style></defs><text x="480" y="24" class="title" text-anchor="middle">RadixAttention — KV cache as a tree, scheduler as the hot-branch pinner</text><rect width="460" height="490" x="40" y="50" class="box"/><text x="270" y="72" class="head" text-anchor="middle">the radix tree</text><rect width="120" height="30" x="210" y="90" class="cool"/><text x="270" y="110" class="step" text-anchor="middle">SYSTEM (2000 tok)</text><rect width="120" height="30" x="210" y="140" class="cool"/><text x="270" y="160" class="step" text-anchor="middle">TOOLS (300 tok)</text><line x1="270" x2="270" y1="120" y2="140" stroke="#1a1a1a" stroke-width="1.2"/><rect width="110" height="30" x="80" y="200" class="cold"/><text x="135" y="220" class="step" text-anchor="middle">DOC_A (500)</text><rect width="110" height="30" x="220" y="200" class="cold"/><text x="275" y="220" class="step" text-anchor="middle">DOC_B (500)</text><rect width="110" height="30" x="360" y="200" class="cold"/><text x="415" y="220" class="step" text-anchor="middle">DOC_C (500)</text><line x1="270" x2="135" y1="170" y2="200" stroke="#1a1a1a" stroke-width="1.2"/><line x1="270" x2="275" y1="170" y2="200" stroke="#1a1a1a" stroke-width="1.2"/><line x1="270" x2="415" y1="170" y2="200" stroke="#1a1a1a" stroke-width="1.2"/><rect width="60" height="22" x="60" y="260" class="hot"/><text x="90" y="276" class="small" text-anchor="middle">Q_1</text><rect width="60" height="22" x="130" y="260" class="hot"/><text x="160" y="276" class="small" text-anchor="middle">Q_2</text><rect width="60" height="22" x="200" y="260" class="hot"/><text x="230" y="276" class="small" text-anchor="middle">Q_3</text><rect width="60" height="22" x="270" y="260" class="hot"/><text x="300" y="276" class="small" text-anchor="middle">Q_4</text><rect width="60" height="22" x="340" y="260" class="hot"/><text x="370" y="276" class="small" text-anchor="middle">Q_5</text><rect width="60" height="22" x="410" y="260" class="hot"/><text x="440" y="276" class="small" text-anchor="middle">Q_6</text><rect width="420" height="70" x="60" y="310" class="box"/><text x="270" y="330" class="step" text-anchor="middle">new request: SYSTEM + TOOLS + DOC_B + Q_7</text><text x="270" y="350" class="small" text-anchor="middle">walk the tree : SYSTEM reuse, TOOLS reuse, DOC_B reuse</text><text x="270" y="366" class="small" text-anchor="middle">allocate blocks only for Q_7 (60 tokens, 4 blocks)</text><rect width="420" height="60" x="60" y="390" class="cool"/><text x="270" y="414" class="step" text-anchor="middle">prefill cost : 60 tokens instead of 2860</text><text x="270" y="432" class="small" text-anchor="middle">on prefix-heavy RAG : up to 6.4x SGLang over vLLM</text><rect width="420" height="70" x="60" y="460" class="hot"/><text x="270" y="482" class="step" text-anchor="middle">the eviction policy</text><text x="270" y="500" class="small" text-anchor="middle">branch-level LRU : evict whole leaves</text><text x="270" y="518" class="small" text-anchor="middle">keeps cache shape matched to tree shape</text><rect width="400" height="490" x="520" y="50" class="box"/><text x="720" y="72" class="head" text-anchor="middle">cache-aware scheduling</text><rect width="360" height="70" x="540" y="90" class="cold"/><text x="720" y="112" class="step" text-anchor="middle">FCFS is wrong for prefix-heavy traffic</text><text x="720" y="130" class="small" text-anchor="middle">serves requests in arrival order</text><text x="720" y="146" class="small" text-anchor="middle">evicts hot branches before they are reused</text><rect width="360" height="80" x="540" y="170" class="cool"/><text x="720" y="192" class="step" text-anchor="middle">depth-first dispatch</text><text x="720" y="210" class="small" text-anchor="middle">prefer requests rooted at the running branch</text><text x="720" y="226" class="small" text-anchor="middle">keep the hot branch resident; stream siblings</text><text x="720" y="242" class="small" text-anchor="middle">approximates radix depth-first traversal</text><rect width="360" height="120" x="540" y="260" class="dsk"/><text x="720" y="282" class="step" text-anchor="middle">numbers (2026)</text><text x="720" y="302" class="small" text-anchor="middle">Llama 3.1 8B H100 ShareGPT 1K :</text><text x="720" y="318" class="small" text-anchor="middle">SGLang ~16,200 tok/s vs vLLM ~12,500 (+29%)</text><text x="720" y="336" class="small" text-anchor="middle">prefix-heavy RAG : up to 6.4x</text><text x="720" y="352" class="small" text-anchor="middle">voice cloning : 86.4% prefix-cache hit rate</text><text x="720" y="368" class="small" text-anchor="middle">production : 50-99% depending on template discipline</text><rect width="360" height="140" x="540" y="390" class="hot"/><text x="720" y="412" class="step" text-anchor="middle">the gotcha — prompt ordering</text><text x="720" y="432" class="small" text-anchor="middle">[system, tools, context] ≠ [system, context, tools]</text><text x="720" y="450" class="small" text-anchor="middle">tree sees two distinct paths</text><text x="720" y="466" class="small" text-anchor="middle">6.4x disappears, back to vLLM throughput</text><text x="720" y="488" class="step" text-anchor="middle">engineer&apos;s lever : fix the template</text><text x="720" y="506" class="small" text-anchor="middle">immutable first (system, tools, schemas)</text><text x="720" y="520" class="small" text-anchor="middle">user input last; real case 7% to 74% in one change</text></svg>