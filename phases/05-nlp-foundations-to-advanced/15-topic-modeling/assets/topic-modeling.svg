<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 400"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.note,.stage{font-size:11px;font-style:italic}.stage{fill:#c0392b;text-anchor:middle}.note{fill:#666}.line{stroke:#1a1a1a;stroke-width:1.2;fill:none}</style></defs><rect width="420" height="380" x="20" y="20" class="box" rx="4"/><text x="230" y="45" class="label" text-anchor="middle">LDA (probabilistic, mixed-membership)</text><rect width="180" height="70" x="40" y="75" class="box" rx="3"/><text x="55" y="100" class="content">document</text><text x="55" y="120" class="content">&quot;stocks rose after</text><text x="55" y="135" class="content">the fed cut rates&quot;</text><rect width="180" height="70" x="240" y="75" class="hot" rx="3"/><text x="250" y="100" class="content">topic mixture</text><text x="250" y="120" class="content">{finance: 0.7,</text><text x="250" y="135" class="content">politics: 0.2, ...}</text><path marker-end="url(#arrow)" d="M 220 110 L 240 110" class="line"/><rect width="380" height="120" x="40" y="170" class="box" rx="3"/><text x="55" y="195" class="content">topic_word matrix:</text><text x="55" y="220" class="content">finance -&gt; { stocks: 0.04, rate: 0.03, ... }</text><text x="55" y="240" class="content">politics -&gt; { fed: 0.05, vote: 0.04, ... }</text><text x="55" y="260" class="content">tech -&gt; { chip: 0.04, ai: 0.03, ... }</text><text x="55" y="280" class="content">each row sums to 1</text><text x="230" y="325" class="note" text-anchor="middle">good for long docs, topic mixtures, limited compute.</text><text x="230" y="345" class="note" text-anchor="middle">weak on short text. no semantics.</text><text x="230" y="365" class="note" text-anchor="middle">interpretable probability distributions.</text><rect width="420" height="380" x="460" y="20" class="box" rx="4"/><text x="670" y="45" class="label" text-anchor="middle">BERTopic (neural, cluster-based)</text><rect width="120" height="40" x="480" y="75" class="box" rx="3"/><text x="540" y="100" class="content" text-anchor="middle">docs (N)</text><path marker-end="url(#arrow)" d="M 605 95 L 630 95" class="line"/><rect width="120" height="40" x="630" y="75" class="hot" rx="3"/><text x="690" y="100" class="content" text-anchor="middle">BERT embed</text><path marker-end="url(#arrow)" d="M 755 95 L 775 95" class="line"/><rect width="90" height="40" x="775" y="75" class="box" rx="3"/><text x="820" y="100" class="content" text-anchor="middle">384-dim</text><path marker-end="url(#arrow)" d="M 820 120 L 820 145" class="line"/><text x="820" y="140" class="stage">UMAP</text><rect width="90" height="40" x="775" y="150" class="box" rx="3"/><text x="820" y="175" class="content" text-anchor="middle">5-dim</text><path marker-end="url(#arrow)" d="M 820 195 L 820 220" class="line"/><text x="820" y="215" class="stage">HDBSCAN</text><circle cx="540" cy="260" r="25" fill="#f3ece0" stroke="#1a1a1a"/><text x="540" y="265" class="content" text-anchor="middle">cluster 0</text><circle cx="640" cy="260" r="20" fill="#f3ece0" stroke="#1a1a1a"/><text x="640" y="265" class="content" text-anchor="middle">1</text><circle cx="720" cy="260" r="18" fill="#f3ece0" stroke="#1a1a1a"/><text x="720" y="265" class="content" text-anchor="middle">2</text><circle cx="820" cy="260" r="22" fill="#f3ece0" stroke="#1a1a1a"/><text x="820" y="265" class="content" text-anchor="middle">3</text><path marker-end="url(#arrow)" d="M 670 290 L 670 315" class="line"/><text x="670" y="310" class="stage">class-based TF-IDF</text><rect width="380" height="50" x="480" y="320" class="box" rx="3"/><text x="670" y="345" class="content" text-anchor="middle">top words per cluster = topic representation</text><text x="670" y="365" class="note" text-anchor="middle">one topic per document. short text friendly. semantic.</text></svg>