<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 280"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:12px;fill:#c0392b;font-style:italic;text-anchor:middle}.line{stroke:#1a1a1a;stroke-width:1.5;fill:none}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="150" height="100" x="20" y="50" class="box" rx="4"/><text x="95" y="75" class="label" text-anchor="middle">source</text><text x="35" y="105" class="content">&quot;The cats</text><text x="35" y="125" class="content">are running.&quot;</text><text x="95" y="145" class="note" text-anchor="middle">eng_Latn</text><path marker-end="url(#arrow)" d="M 170 100 L 210 100" class="line"/><text x="190" y="90" class="stage">tokenize</text><rect width="130" height="100" x="210" y="50" class="box" rx="4"/><text x="275" y="75" class="label" text-anchor="middle">subword ids</text><text x="225" y="105" class="content">[1201, 412,</text><text x="225" y="125" class="content">8834, 92]</text><text x="275" y="145" class="note" text-anchor="middle">SentencePiece</text><path marker-end="url(#arrow)" d="M 340 100 L 380 100" class="line"/><rect width="170" height="100" x="380" y="50" class="hot" rx="4"/><text x="465" y="75" class="label" text-anchor="middle">encoder-decoder</text><text x="395" y="100" class="content">NLLB, mBART,</text><text x="395" y="120" class="content">M2M, Marian</text><text x="465" y="140" class="note" text-anchor="middle">forced_bos = fra_Latn</text><path marker-end="url(#arrow)" d="M 550 100 L 590 100" class="line"/><text x="570" y="90" class="stage">beam search</text><rect width="130" height="100" x="590" y="50" class="box" rx="4"/><text x="655" y="75" class="label" text-anchor="middle">target ids</text><text x="605" y="105" class="content">[831, 5102,</text><text x="605" y="125" class="content">2918, 4]</text><text x="655" y="145" class="note" text-anchor="middle">fra_Latn</text><path marker-end="url(#arrow)" d="M 720 100 L 760 100" class="line"/><text x="740" y="90" class="stage">detok</text><rect width="120" height="100" x="760" y="50" class="box" rx="4"/><text x="820" y="75" class="label" text-anchor="middle">output</text><text x="775" y="105" class="content">&quot;Les chats</text><text x="775" y="125" class="content">courent.&quot;</text><text x="450" y="200" class="stage" text-anchor="middle">watch for: hallucinations, off-target language, terminology drift, formality mismatch</text><text x="450" y="230" class="stage" text-anchor="middle">score with sacrebleu (BLEU + chrF); always reference-matched</text></svg>