<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 440"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#c0392b" d="M0,0 L10,5 L0,10 z"/></marker><style>.doc{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.ent1{fill:#e3f2fd;stroke:#1565c0}.ent1,.ent2,.ent3{stroke-width:1.5}.ent2{fill:#fce4ec;stroke:#c0392b}.ent3{fill:#e8f5e9;stroke:#2e7d32}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:13px;fill:#333}.span1{fill:#1565c0}.span1,.span2,.span3{font-weight:600}.span2{fill:#c0392b}.span3{fill:#2e7d32}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">mentions → clusters → entities</text><rect width="820" height="140" x="40" y="55" class="doc"/><text x="50" y="80" class="label">document</text><text x="50" y="110" class="content"><tspan class="span1">Tim Cook</tspan> walked onto the stage. <tspan class="span1">He</tspan> announced the new iPhone.</text><text x="50" y="135" class="content"><tspan class="span2">The company</tspan> also showed a laptop. <tspan class="span2">It</tspan> will ship in June.</text><text x="50" y="160" class="content"><tspan class="span3">Mary Chen</tspan> leads the AI team. <tspan class="span3">She</tspan> built the voice assistant.</text><text x="50" y="185" class="caption">three entities, seven mentions across three sentences</text><text x="450" y="230" class="label" text-anchor="middle">coreference clustering</text><rect width="240" height="130" x="60" y="250" class="ent1"/><text x="180" y="278" class="label" text-anchor="middle">Entity #1</text><text x="180" y="300" class="content" text-anchor="middle">Tim Cook</text><text x="180" y="320" class="content" text-anchor="middle">He</text><text x="180" y="355" class="caption" text-anchor="middle">type: PERSON</text><rect width="240" height="130" x="330" y="250" class="ent2"/><text x="450" y="278" class="label" text-anchor="middle">Entity #2</text><text x="450" y="300" class="content" text-anchor="middle">The company</text><text x="450" y="320" class="content" text-anchor="middle">It</text><text x="450" y="355" class="caption" text-anchor="middle">type: ORG</text><rect width="240" height="130" x="600" y="250" class="ent3"/><text x="720" y="278" class="label" text-anchor="middle">Entity #3</text><text x="720" y="300" class="content" text-anchor="middle">Mary Chen</text><text x="720" y="320" class="content" text-anchor="middle">She</text><text x="720" y="355" class="caption" text-anchor="middle">type: PERSON</text><text x="450" y="420" class="caption" text-anchor="middle">resolved clusters feed IE, QA, summarization — downstream tasks see one entity, not many mentions</text></svg>