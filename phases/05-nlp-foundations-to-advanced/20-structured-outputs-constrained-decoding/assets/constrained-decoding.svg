<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 420"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}.struck{text-decoration:line-through;fill:#aaa}</style></defs><text x="450" y="30" class="title" text-anchor="middle">constrained decoding — mask invalid tokens before sampling</text><rect width="160" height="80" x="40" y="70" class="box"/><text x="120" y="95" class="label" text-anchor="middle">LLM</text><text x="120" y="115" class="content" text-anchor="middle">next-token</text><text x="120" y="132" class="content" text-anchor="middle">logits</text><line x1="200" x2="240" y1="110" y2="110" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="200" height="260" x="240" y="70" class="box"/><text x="340" y="90" class="label" text-anchor="middle">raw logits (vocab)</text><text x="260" y="115" class="content">&quot;(&quot; : 2.1</text><text x="260" y="135" class="content">&quot;0&quot; : 1.8</text><text x="260" y="155" class="content">&quot;1&quot; : 1.6</text><text x="260" y="175" class="content">&quot;2&quot; : 1.4</text><text x="260" y="195" class="content">&quot;a&quot; : 0.9</text><text x="260" y="215" class="content">&quot;b&quot; : 0.7</text><text x="260" y="235" class="content">&quot;-&quot; : -0.1</text><text x="260" y="255" class="content">&quot; &quot; : -0.3</text><text x="260" y="275" class="content">...</text><text x="260" y="305" class="content">100k tokens</text><line x1="440" x2="480" y1="200" y2="200" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="180" height="110" x="480" y="70" class="hot"/><text x="570" y="95" class="label" text-anchor="middle">FSM state</text><text x="570" y="118" class="content" text-anchor="middle">at pos 0:</text><text x="570" y="138" class="content" text-anchor="middle">\d{3}-\d{3}-\d{4}</text><text x="570" y="158" class="content" text-anchor="middle">valid: {0-9}</text><line x1="570" x2="570" y1="180" y2="210" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="180" height="120" x="480" y="210" class="box"/><text x="570" y="235" class="label" text-anchor="middle">logit processor</text><text x="570" y="260" class="content" text-anchor="middle">logit[t] = -inf</text><text x="570" y="278" class="content" text-anchor="middle">if t not in valid</text><text x="570" y="305" class="caption" text-anchor="middle">keeps 10 of 100,000</text><line x1="660" x2="700" y1="200" y2="200" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="180" height="260" x="700" y="70" class="box"/><text x="790" y="90" class="label" text-anchor="middle">masked logits</text><text x="720" y="115" class="content struck">&quot;(&quot; : -inf</text><text x="720" y="135" class="content">&quot;0&quot; : 1.8</text><text x="720" y="155" class="content">&quot;1&quot; : 1.6</text><text x="720" y="175" class="content">&quot;2&quot; : 1.4</text><text x="720" y="195" class="content struck">&quot;a&quot; : -inf</text><text x="720" y="215" class="content struck">&quot;b&quot; : -inf</text><text x="720" y="235" class="content struck">&quot;-&quot; : -inf</text><text x="720" y="255" class="content struck">&quot; &quot; : -inf</text><text x="720" y="275" class="content">...</text><text x="720" y="305" class="content">sample → &quot;5&quot;</text><text x="450" y="370" class="caption" text-anchor="middle">repeat at every step; FSM advances with each accepted token</text><text x="450" y="390" class="caption" text-anchor="middle">invalid continuations are unreachable — 100% valid output by construction</text><path fill="none" stroke="#c0392b" stroke-dasharray="4 3" stroke-width="1" marker-end="url(#arrow)" d="M 790 330 Q 500 410 120 160"/></svg>