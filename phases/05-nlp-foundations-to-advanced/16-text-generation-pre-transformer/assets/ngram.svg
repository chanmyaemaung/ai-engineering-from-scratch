<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 380"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:11px;fill:#c0392b;font-style:italic;text-anchor:middle}.line{stroke:#1a1a1a;stroke-width:1.5;fill:none}</style></defs><rect width="200" height="260" x="20" y="30" class="box" rx="4"/><text x="120" y="55" class="label" text-anchor="middle">1. count</text><text x="35" y="90" class="content">training corpus</text><text x="35" y="115" class="content">&quot;the cat sat&quot;</text><text x="35" y="135" class="content">&quot;the cat ran&quot;</text><text x="35" y="155" class="content">&quot;the dog sat&quot;</text><text x="35" y="190" class="content">trigram counts:</text><text x="35" y="210" class="content">(the, cat, sat): 1</text><text x="35" y="230" class="content">(the, cat, ran): 1</text><text x="35" y="250" class="content">(the, dog, sat): 1</text><text x="35" y="275" class="content">(the, cat, *): 2</text><path marker-end="url(#arrow)" d="M 220 160 L 260 160" class="line"/><rect width="220" height="260" x="260" y="30" class="hot" rx="4"/><text x="370" y="55" class="label" text-anchor="middle">2. smooth</text><text x="275" y="90" class="content">raw count gives zero</text><text x="275" y="110" class="content">to unseen n-grams.</text><text x="275" y="145" class="content">Kneser-Ney redistributes:</text><text x="275" y="170" class="content">discount seen counts</text><text x="275" y="190" class="content">use continuation prob</text><text x="275" y="210" class="content">for unseen words</text><text x="275" y="245" class="content">P(w | prev) = max(c-D, 0)/N</text><text x="275" y="265" class="content">+ λ · P_cont(w)</text><path marker-end="url(#arrow)" d="M 480 160 L 520 160" class="line"/><rect width="180" height="260" x="520" y="30" class="box" rx="4"/><text x="610" y="55" class="label" text-anchor="middle">3. generate</text><text x="535" y="90" class="content">sample from</text><text x="535" y="110" class="content">P(w | prev):</text><text x="535" y="145" class="content">&quot;the&quot; (start)</text><text x="535" y="165" class="content">-&gt; &quot;cat&quot; (p=0.6)</text><text x="535" y="185" class="content">-&gt; &quot;sat&quot; (p=0.4)</text><text x="535" y="205" class="content">-&gt; &quot;on&quot;</text><text x="535" y="225" class="content">-&gt; &quot;the&quot;</text><text x="535" y="250" class="content">locally plausible,</text><text x="535" y="270" class="content">globally incoherent.</text><path marker-end="url(#arrow)" d="M 700 160 L 740 160" class="line"/><rect width="140" height="260" x="740" y="30" class="box" rx="4"/><text x="810" y="55" class="label" text-anchor="middle">4. evaluate</text><text x="755" y="100" class="content">perplexity</text><text x="755" y="125" class="content">= exp(- (1/N) Σ</text><text x="755" y="145" class="content">log P(w_i | ctx))</text><text x="755" y="180" class="content">lower = better</text><text x="755" y="220" class="content">Brown corpus:</text><text x="755" y="240" class="content">KN 4-gram ~140</text><text x="755" y="260" class="content">transformer ~20</text><text x="450" y="330" class="stage" text-anchor="middle">Kneser-Ney stayed the best n-gram smoother for 20 years.</text><text x="450" y="350" class="stage" text-anchor="middle">Transformers closed the perplexity gap by ~10x, not by inventing a better smoother.</text></svg>