<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 380"><defs><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#f3ece0}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:13px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.note,.stage{font-size:11px;fill:#666;font-style:italic}.stage{font-size:12px;fill:#c0392b;text-anchor:middle}</style></defs><rect width="860" height="120" x="20" y="30" class="box" rx="4"/><text x="35" y="55" class="label">BIO tagging</text><text x="35" y="75" class="note">label each token with B-TYPE (begin), I-TYPE (inside), or O (outside)</text><text x="40" y="110" class="content">token: Apple sued Google over its iPhone search deal in the US .</text><text x="40" y="135" class="content">label: B-ORG O B-ORG O O B-PROD O O O O B-GPE O</text><rect width="200" height="160" x="20" y="180" class="box" rx="4"/><text x="120" y="205" class="label" text-anchor="middle">rule-based</text><text x="35" y="235" class="content">gazetteer match</text><text x="35" y="255" class="content">regex + dicts</text><text x="35" y="285" class="note">high precision</text><text x="35" y="305" class="note">zero OOV coverage</text><text x="35" y="325" class="note">no disambiguation</text><rect width="200" height="160" x="240" y="180" class="box" rx="4"/><text x="340" y="205" class="label" text-anchor="middle">CRF</text><text x="255" y="235" class="content">hand features:</text><text x="255" y="255" class="content">shape, suffix,</text><text x="255" y="275" class="content">neighbors, case</text><text x="255" y="305" class="note">enforces valid</text><text x="255" y="325" class="note">BIO transitions</text><rect width="200" height="160" x="460" y="180" class="box" rx="4"/><text x="560" y="205" class="label" text-anchor="middle">BiLSTM-CRF</text><text x="475" y="235" class="content">learned features</text><text x="475" y="255" class="content">embed → BiLSTM</text><text x="475" y="275" class="content">→ CRF head</text><text x="475" y="305" class="note">no more hand</text><text x="475" y="325" class="note">engineering</text><rect width="200" height="160" x="680" y="180" class="hot" rx="4"/><text x="780" y="205" class="label" text-anchor="middle">transformer NER</text><text x="695" y="235" class="content">fine-tune BERT</text><text x="695" y="255" class="content">token-classif head</text><text x="695" y="275" class="content">aggregate spans</text><text x="695" y="305" class="note">best accuracy</text><text x="695" y="325" class="note">most compute</text><text x="450" y="370" class="stage" text-anchor="middle">pick the cheapest method that hits your accuracy bar</text></svg>