<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 440"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><marker id="red-arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#c0392b" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.cell{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.cell{fill:#f3ece0;stroke-width:1.2}.hot{fill:#fff1d6;stroke:#c0392b;stroke-width:2}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:12px;fill:#c0392b;font-style:italic;text-anchor:middle}.att,.line{fill:none}.line{stroke:#1a1a1a;stroke-width:1.2}.att{stroke:#c0392b;stroke-width:1.5;opacity:.7}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="860" height="160" x="20" y="30" class="box" rx="4"/><text x="35" y="55" class="label">encoder hidden states (kept, not discarded)</text><rect width="60" height="40" x="40" y="80" class="cell" rx="3"/><text x="70" y="105" class="content" text-anchor="middle">h1</text><rect width="60" height="40" x="120" y="80" class="cell" rx="3"/><text x="150" y="105" class="content" text-anchor="middle">h2</text><rect width="60" height="40" x="200" y="80" class="cell" rx="3"/><text x="230" y="105" class="content" text-anchor="middle">h3</text><rect width="60" height="40" x="280" y="80" class="cell" rx="3"/><text x="310" y="105" class="content" text-anchor="middle">h4</text><rect width="60" height="40" x="360" y="80" class="cell" rx="3"/><text x="390" y="105" class="content" text-anchor="middle">h5</text><rect width="60" height="30" x="40" y="135" class="cell" rx="3"/><text x="70" y="155" class="content" text-anchor="middle">Je</text><rect width="60" height="30" x="120" y="135" class="cell" rx="3"/><text x="150" y="155" class="content" text-anchor="middle">ne</text><rect width="60" height="30" x="200" y="135" class="cell" rx="3"/><text x="230" y="155" class="content" text-anchor="middle">suis</text><rect width="60" height="30" x="280" y="135" class="cell" rx="3"/><text x="310" y="155" class="content" text-anchor="middle">pas</text><rect width="60" height="30" x="360" y="135" class="cell" rx="3"/><text x="390" y="155" class="content" text-anchor="middle">chat</text><path d="M 70 135 L 70 120" class="line"/><path d="M 150 135 L 150 120" class="line"/><path d="M 230 135 L 230 120" class="line"/><path d="M 310 135 L 310 120" class="line"/><path d="M 390 135 L 390 120" class="line"/><rect width="80" height="40" x="500" y="80" class="hot" rx="3"/><text x="540" y="105" class="content" text-anchor="middle">s_{t-1}</text><text x="540" y="70" class="note" text-anchor="middle">query</text><rect width="170" height="110" x="460" y="220" class="box" rx="4"/><text x="545" y="245" class="label" text-anchor="middle">score + softmax</text><text x="475" y="275" class="content">α_{t,i} = softmax(</text><text x="475" y="295" class="content">score(s_{t-1}, h_i)</text><text x="475" y="315" class="content">)</text><path marker-end="url(#red-arrow)" d="M 70 110 Q 300 180 470 270" class="att"/><path marker-end="url(#red-arrow)" d="M 150 110 Q 300 180 470 270" class="att"/><path marker-end="url(#red-arrow)" d="M 230 110 Q 350 180 470 270" class="att"/><path marker-end="url(#red-arrow)" d="M 310 110 Q 400 180 470 270" class="att"/><path marker-end="url(#red-arrow)" d="M 390 110 Q 450 180 470 270" class="att"/><path d="M 540 120 L 545 220" class="line"/><rect width="180" height="110" x="680" y="220" class="box" rx="4"/><text x="770" y="245" class="label" text-anchor="middle">context c_t</text><text x="695" y="275" class="content">= Σ α_{t,i} · h_i</text><text x="695" y="305" class="content">weighted average</text><text x="695" y="322" class="content">of encoder states</text><path marker-end="url(#arrow)" d="M 630 275 L 680 275" class="line"/><rect width="180" height="50" x="680" y="370" class="hot" rx="4"/><text x="770" y="395" class="label" text-anchor="middle">decoder step</text><text x="770" y="415" class="content" text-anchor="middle">outputs next token</text><path marker-end="url(#arrow)" d="M 770 330 L 770 370" class="line"/><text x="450" y="415" class="stage">no more fixed-size bottleneck. context reshapes every step.</text></svg>