<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 420"><defs><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:11px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}.dim{fill:#999;font-size:10px;font-family:&apos;Menlo&apos;,monospace}</style></defs><text x="450" y="30" class="title" text-anchor="middle">three embedding modes — same passage, three vectors</text><rect width="820" height="40" x="40" y="55" class="box"/><text x="450" y="80" class="content" text-anchor="middle">&quot;Apple released the first iPhone on June 29, 2007.&quot;</text><rect width="260" height="260" x="40" y="115" class="box"/><text x="170" y="140" class="label" text-anchor="middle">dense</text><text x="170" y="160" class="caption" text-anchor="middle">one vector, fixed size</text><rect width="220" height="30" x="60" y="180" class="hot"/><text x="170" y="200" class="content" text-anchor="middle">[0.23, -0.11, ..., 0.08]</text><text x="170" y="225" class="dim" text-anchor="middle">dim = 1024 (BGE-M3)</text><text x="170" y="260" class="caption" text-anchor="middle">cosine similarity ranks</text><text x="170" y="278" class="caption" text-anchor="middle">passages by meaning</text><text x="170" y="310" class="label" text-anchor="middle">Matryoshka option:</text><text x="170" y="328" class="content" text-anchor="middle">truncate to 256 dim</text><text x="170" y="346" class="content" text-anchor="middle">≈ 1% accuracy loss</text><text x="170" y="364" class="content" text-anchor="middle">6x storage savings</text><rect width="260" height="260" x="320" y="115" class="box"/><text x="450" y="140" class="label" text-anchor="middle">sparse (SPLADE-style)</text><text x="450" y="160" class="caption" text-anchor="middle">one weight per vocab token</text><rect width="220" height="30" x="340" y="180" class="hot"/><text x="450" y="200" class="content" text-anchor="middle">{iPhone: 2.1, Apple: 1.8, ...}</text><text x="450" y="225" class="dim" text-anchor="middle">mostly zeros, |vocab| slots</text><text x="450" y="260" class="caption" text-anchor="middle">learned BM25 —</text><text x="450" y="278" class="caption" text-anchor="middle">term weights from transformer</text><text x="450" y="310" class="label" text-anchor="middle">strength:</text><text x="450" y="328" class="content" text-anchor="middle">keyword-heavy queries,</text><text x="450" y="346" class="content" text-anchor="middle">named entities,</text><text x="450" y="364" class="content" text-anchor="middle">rare terms</text><rect width="260" height="260" x="600" y="115" class="box"/><text x="730" y="140" class="label" text-anchor="middle">multi-vector (ColBERT)</text><text x="730" y="160" class="caption" text-anchor="middle">one vector per token</text><rect width="220" height="30" x="620" y="180" class="hot"/><text x="730" y="200" class="content" text-anchor="middle">[v_Apple, v_released, ...]</text><text x="730" y="225" class="dim" text-anchor="middle">(n_tokens, 128)</text><text x="730" y="260" class="caption" text-anchor="middle">MaxSim: for each q-token</text><text x="730" y="278" class="caption" text-anchor="middle">take best d-token match</text><text x="730" y="310" class="label" text-anchor="middle">tradeoff:</text><text x="730" y="328" class="content" text-anchor="middle">larger index,</text><text x="730" y="346" class="content" text-anchor="middle">better recall on long</text><text x="730" y="364" class="content" text-anchor="middle">and specialized queries</text><text x="450" y="405" class="caption" text-anchor="middle">BGE-M3 emits all three from one forward pass — fuse with weighted sum or RRF</text></svg>