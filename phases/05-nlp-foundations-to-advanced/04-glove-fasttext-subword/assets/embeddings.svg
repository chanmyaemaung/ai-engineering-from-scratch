<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 420"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.label{font-size:15px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,&apos;Courier New&apos;,monospace}.note,.stage{font-style:italic}.stage{font-size:12px;fill:#c0392b;text-anchor:middle}.note{font-size:11px;fill:#666}</style></defs><rect width="270" height="360" x="20" y="30" class="box" rx="4"/><text x="155" y="55" class="label" text-anchor="middle">GloVe</text><text x="35" y="78" class="note">co-occurrence matrix factorization</text><text x="35" y="110" class="content">X[i][j] = count(word j near i)</text><text x="35" y="130" class="content">train so v_i · v_j + b_i + b_j</text><text x="35" y="150" class="content">≈ log(X[i][j])</text><rect width="220" height="150" x="35" y="180" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1"/><text x="50" y="205" class="content">the cat dog sat</text><text x="50" y="225" class="content">the 0 5 4 6</text><text x="50" y="245" class="content">cat 5 0 1 3</text><text x="50" y="265" class="content">dog 4 1 0 2</text><text x="50" y="285" class="content">sat 6 3 2 0</text><text x="155" y="365" class="stage">one big matrix, factorize once</text><rect width="270" height="360" x="310" y="30" class="box" rx="4"/><text x="445" y="55" class="label" text-anchor="middle">FastText</text><text x="325" y="78" class="note">word = sum of char n-grams</text><text x="325" y="110" class="content">&quot;where&quot;</text><text x="325" y="135" class="content">= &lt;wh + whe + her</text><text x="325" y="155" class="content">+ ere + re&gt;</text><text x="325" y="175" class="content">+ &lt;whe + wher + here</text><text x="325" y="195" class="content">+ ere&gt; + &lt;where&gt;</text><text x="325" y="230" class="content">&quot;whereupon&quot; shares</text><text x="325" y="250" class="content">&lt;wh, whe, her, ere</text><text x="325" y="270" class="content">with &quot;where&quot;</text><text x="325" y="305" class="content">→ sensible vector even for</text><text x="325" y="325" class="content">OOV words</text><text x="445" y="365" class="stage">handles new and rare words</text><rect width="280" height="360" x="600" y="30" class="box" rx="4"/><text x="740" y="55" class="label" text-anchor="middle">BPE</text><text x="615" y="78" class="note">learned subword vocabulary</text><text x="615" y="110" class="content">start: bytes or chars</text><text x="615" y="130" class="content">iterate:</text><text x="615" y="150" class="content">find most-common pair</text><text x="615" y="170" class="content">merge it, add to vocab</text><text x="615" y="205" class="content">after training:</text><text x="615" y="230" class="content">&quot;unbelievably&quot;</text><text x="615" y="250" class="content">→ un + bel + iev + ably</text><text x="615" y="290" class="content">&quot;tokenization&quot;</text><text x="615" y="310" class="content">→ token + ization</text><text x="740" y="365" class="stage">every LLM tokenizer uses this</text></svg>