<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 360"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:12px;fill:#c0392b;font-style:italic;text-anchor:middle}.line{stroke:#1a1a1a;stroke-width:1.5;fill:none}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="420" height="310" x="20" y="30" class="box" rx="4"/><text x="230" y="55" class="label" text-anchor="middle">extractive (TextRank)</text><circle cx="100" cy="130" r="20" fill="#f3ece0" stroke="#1a1a1a"/><text x="100" y="134" class="content" text-anchor="middle">s1</text><circle cx="220" cy="110" r="20" fill="#fff1d6" stroke="#c0392b" stroke-width="2"/><text x="220" y="114" class="content" text-anchor="middle">s2</text><circle cx="340" cy="130" r="20" fill="#f3ece0" stroke="#1a1a1a"/><text x="340" y="134" class="content" text-anchor="middle">s3</text><circle cx="130" cy="220" r="20" fill="#f3ece0" stroke="#1a1a1a"/><text x="130" y="224" class="content" text-anchor="middle">s4</text><circle cx="260" cy="230" r="20" fill="#fff1d6" stroke="#c0392b" stroke-width="2"/><text x="260" y="234" class="content" text-anchor="middle">s5</text><circle cx="350" cy="220" r="20" fill="#f3ece0" stroke="#1a1a1a"/><text x="350" y="224" class="content" text-anchor="middle">s6</text><line x1="120" x2="200" y1="130" y2="110" stroke="#999"/><line x1="240" x2="320" y1="110" y2="130" stroke="#999"/><line x1="100" x2="130" y1="150" y2="200" stroke="#999"/><line x1="220" x2="260" y1="130" y2="210" stroke="#999"/><line x1="340" x2="350" y1="150" y2="200" stroke="#999"/><line x1="220" x2="130" y1="130" y2="200" stroke="#999"/><line x1="220" x2="350" y1="130" y2="200" stroke="#999"/><line x1="260" x2="350" y1="230" y2="220" stroke="#999"/><line x1="260" x2="130" y1="230" y2="220" stroke="#999"/><text x="230" y="290" class="stage">PageRank picks most connected sentences</text><text x="230" y="310" class="note" text-anchor="middle">verbatim. never hallucinates.</text><text x="230" y="325" class="note" text-anchor="middle">risk: misses distributed content.</text><rect width="420" height="310" x="460" y="30" class="box" rx="4"/><text x="670" y="55" class="label" text-anchor="middle">abstractive (BART / T5 / Pegasus)</text><rect width="180" height="60" x="480" y="90" class="box" rx="3"/><text x="570" y="115" class="content" text-anchor="middle">article (500-2000 tokens)</text><text x="570" y="135" class="content" text-anchor="middle">tokens in</text><path marker-end="url(#arrow)" d="M 660 120 L 700 120" class="line"/><rect width="160" height="60" x="700" y="90" class="hot" rx="3"/><text x="780" y="115" class="content" text-anchor="middle">transformer enc-dec</text><text x="780" y="135" class="content" text-anchor="middle">cross-attention</text><path marker-end="url(#arrow)" d="M 780 150 L 780 190" class="line"/><rect width="160" height="50" x="700" y="190" class="box" rx="3"/><text x="780" y="215" class="content" text-anchor="middle">new text (60-200 tok)</text><text x="670" y="275" class="stage">generates new tokens, not selects</text><text x="670" y="295" class="note" text-anchor="middle">fluent, compressive.</text><text x="670" y="310" class="note" text-anchor="middle">risk: hallucinated entities,</text><text x="670" y="325" class="note" text-anchor="middle">flipped polarity, wrong numbers.</text></svg>