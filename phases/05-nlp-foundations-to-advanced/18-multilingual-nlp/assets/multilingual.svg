<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 380"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:11px;fill:#c0392b;font-style:italic;text-anchor:middle}.line{stroke:#1a1a1a;stroke-width:1.2;fill:none}.axis{stroke:#999;stroke-width:1;stroke-dasharray:3,3}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="400" height="340" x="20" y="20" class="box" rx="4"/><text x="220" y="45" class="label" text-anchor="middle">multilingual embedding space</text><line x1="40" x2="400" y1="340" y2="340" class="axis"/><line x1="220" x2="220" y1="70" y2="340" class="axis"/><circle cx="130" cy="180" r="8" fill="#1a1a1a"/><text x="100" y="175" class="content">cat (en)</text><circle cx="150" cy="175" r="8" fill="#1a1a1a"/><text x="155" y="170" class="content">chat (fr)</text><circle cx="140" cy="200" r="8" fill="#1a1a1a"/><text x="90" y="215" class="content">gato (es)</text><circle cx="165" cy="190" r="8" fill="#1a1a1a"/><text x="185" y="192" class="content">Katze (de)</text><circle cx="145" cy="215" r="8" fill="#1a1a1a"/><text x="100" y="235" class="content">बिल्ली (hi)</text><circle cx="300" cy="250" r="8" fill="#1a1a1a"/><text x="260" y="245" class="content">dog (en)</text><circle cx="320" cy="245" r="8" fill="#1a1a1a"/><text x="325" y="240" class="content">chien (fr)</text><text x="220" y="305" class="stage">translations cluster.</text><text x="220" y="322" class="stage">distant words stay distant.</text><rect width="440" height="340" x="440" y="20" class="box" rx="4"/><text x="660" y="45" class="label" text-anchor="middle">cross-lingual transfer</text><rect width="180" height="50" x="460" y="75" class="hot" rx="3"/><text x="550" y="100" class="content" text-anchor="middle">fine-tune on English</text><text x="550" y="118" class="content" text-anchor="middle">sentiment labels</text><path marker-end="url(#arrow)" d="M 640 100 L 670 100" class="line"/><rect width="180" height="50" x="680" y="75" class="box" rx="3"/><text x="770" y="100" class="content" text-anchor="middle">run on Hindi, Urdu,</text><text x="770" y="118" class="content" text-anchor="middle">Swahili, French ...</text><text x="660" y="160" class="stage">zero-shot transfer.</text><rect width="180" height="50" x="460" y="185" class="hot" rx="3"/><text x="550" y="210" class="content" text-anchor="middle">add 100-500 target</text><text x="550" y="228" class="content" text-anchor="middle">language examples</text><path marker-end="url(#arrow)" d="M 640 210 L 670 210" class="line"/><rect width="180" height="50" x="680" y="185" class="box" rx="3"/><text x="770" y="210" class="content" text-anchor="middle">accuracy 95-98%</text><text x="770" y="228" class="content" text-anchor="middle">of English baseline</text><text x="660" y="270" class="stage">few-shot fine-tuning.</text><text x="660" y="300" class="note" text-anchor="middle">source language matters.</text><text x="660" y="315" class="note" text-anchor="middle">Hindi source &gt; English source</text><text x="660" y="330" class="note" text-anchor="middle">for Marathi, Bengali, Nepali.</text><text x="660" y="350" class="note" text-anchor="middle">Check LANGRANK / qWALS.</text></svg>