<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 360"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:11px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.note{font-size:10px;fill:#666;font-style:italic}</style></defs><rect width="200" height="300" x="20" y="30" class="box" rx="4"/><text x="120" y="55" class="label" text-anchor="middle">rule-based</text><text x="35" y="78" class="note">1960s → today for safety-critical</text><text x="35" y="105" class="content">IF matches &quot;i want&quot;</text><text x="35" y="125" class="content">THEN &quot;why do you want&quot;</text><text x="35" y="165" class="content">intent classifier</text><text x="35" y="183" class="content">+ slot filling</text><text x="35" y="201" class="content">+ state machine</text><text x="35" y="235" class="note">pro: predictable,</text><text x="35" y="250" class="note">deterministic,</text><text x="35" y="265" class="note">no hallucination</text><text x="35" y="290" class="note">con: narrow scope</text><text x="35" y="305" class="note">doesn&apos;t handle novel inputs</text><rect width="200" height="300" x="240" y="30" class="box" rx="4"/><text x="340" y="55" class="label" text-anchor="middle">retrieval-based</text><text x="255" y="78" class="note">2010s. still ships for FAQs</text><text x="255" y="105" class="content">encode utterance,</text><text x="255" y="123" class="content">find nearest match,</text><text x="255" y="141" class="content">return stored response</text><text x="255" y="180" class="content">threshold for refusal</text><text x="255" y="220" class="note">pro: handles paraphrase,</text><text x="255" y="235" class="note">no hallucination,</text><text x="255" y="250" class="note">scales cheaply</text><text x="255" y="280" class="note">con: can&apos;t combine info,</text><text x="255" y="295" class="note">can&apos;t do multi-turn</text><text x="255" y="310" class="note">reasoning</text><rect width="200" height="300" x="460" y="30" class="box" rx="4"/><text x="560" y="55" class="label" text-anchor="middle">neural (seq2seq)</text><text x="475" y="78" class="note">2014-2019. rarely solo now</text><text x="475" y="105" class="content">encoder-decoder on</text><text x="475" y="123" class="content">conversation logs</text><text x="475" y="141" class="content">generates from scratch</text><text x="475" y="180" class="note">pro: fluent phrasing</text><text x="475" y="220" class="note">con: generic outputs</text><text x="475" y="235" class="note">(&quot;I don&apos;t know&quot;),</text><text x="475" y="250" class="note">factual drift, no grounding,</text><text x="475" y="265" class="note">no tool use</text><text x="475" y="290" class="note">used inside hybrids today,</text><text x="475" y="305" class="note">not solo</text><rect width="200" height="300" x="680" y="30" class="hot" rx="4"/><text x="780" y="55" class="label" text-anchor="middle">LLM agent loop</text><text x="695" y="78" class="note">2023 → 2026 production</text><text x="695" y="105" class="content">plan → call tool</text><text x="695" y="123" class="content">→ observe → decide</text><text x="695" y="141" class="content">→ ... → answer</text><text x="695" y="175" class="content">RAG grounding</text><text x="695" y="195" class="content">tool contracts</text><text x="695" y="215" class="content">eval + observability</text><text x="695" y="245" class="note">pro: takes actions,</text><text x="695" y="260" class="note">handles novelty</text><text x="695" y="290" class="note">con: harder to reason about,</text><text x="695" y="305" class="note">prompt injection,</text><text x="695" y="320" class="note">infinite loops</text></svg>