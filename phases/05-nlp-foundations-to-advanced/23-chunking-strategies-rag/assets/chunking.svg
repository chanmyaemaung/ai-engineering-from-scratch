<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.child,.chunk,.parent{stroke-width:1.2}.chunk,.parent{fill:#fff1d6;stroke:#c0392b}.parent{fill:#e3f2fd;stroke:#1565c0}.child{fill:#fff1d6;stroke:#c0392b}.content{font-size:10px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:10px;fill:#555;font-style:italic}.sub,.title{fill:#1a1a1a}.title{font-size:16px;font-weight:700}.sub{font-size:12px;font-weight:600}</style></defs><text x="450" y="28" class="title" text-anchor="middle">six chunking strategies on the same document</text><text x="40" y="60" class="sub">fixed (size=N)</text><rect width="100" height="30" x="40" y="70" class="chunk"/><rect width="100" height="30" x="142" y="70" class="chunk"/><rect width="100" height="30" x="244" y="70" class="chunk"/><rect width="100" height="30" x="346" y="70" class="chunk"/><rect width="100" height="30" x="448" y="70" class="chunk"/><rect width="100" height="30" x="550" y="70" class="chunk"/><rect width="100" height="30" x="652" y="70" class="chunk"/><rect width="60" height="30" x="754" y="70" class="chunk"/><text x="450" y="115" class="caption" text-anchor="middle">hard split every N chars — breaks mid-sentence</text><text x="40" y="140" class="sub">recursive (\n\n → \n → . → &apos; &apos;)</text><rect width="140" height="30" x="40" y="150" class="chunk"/><rect width="110" height="30" x="182" y="150" class="chunk"/><rect width="170" height="30" x="294" y="150" class="chunk"/><rect width="130" height="30" x="466" y="150" class="chunk"/><rect width="160" height="30" x="598" y="150" class="chunk"/><rect width="100" height="30" x="760" y="150" class="chunk"/><text x="450" y="195" class="caption" text-anchor="middle">try separators in order; 2026 default</text><text x="40" y="220" class="sub">semantic (embedding similarity)</text><rect width="210" height="30" x="40" y="230" class="chunk"/><rect width="70" height="30" x="252" y="230" class="chunk"/><rect width="310" height="30" x="324" y="230" class="chunk"/><rect width="90" height="30" x="636" y="230" class="chunk"/><rect width="130" height="30" x="728" y="230" class="chunk"/><text x="450" y="275" class="caption" text-anchor="middle">split where adjacent-sentence similarity drops</text><text x="40" y="300" class="sub">parent-document (child for retrieval, parent for context)</text><rect width="380" height="30" x="40" y="310" class="parent"/><rect width="440" height="30" x="422" y="310" class="parent"/><rect width="85" height="26" x="45" y="312" class="child"/><rect width="85" height="26" x="132" y="312" class="child"/><rect width="85" height="26" x="219" y="312" class="child"/><rect width="110" height="26" x="306" y="312" class="child"/><rect width="85" height="26" x="427" y="312" class="child"/><rect width="85" height="26" x="514" y="312" class="child"/><rect width="85" height="26" x="601" y="312" class="child"/><rect width="85" height="26" x="688" y="312" class="child"/><rect width="85" height="26" x="775" y="312" class="child"/><text x="450" y="355" class="caption" text-anchor="middle">embed the small boxes, return the large boxes — degrades gracefully</text><text x="40" y="380" class="sub">late chunking (embed full doc first, then pool)</text><rect width="820" height="20" x="40" y="390" class="box"/><text x="450" y="404" class="content" text-anchor="middle">token embeddings across full doc</text><rect width="150" height="20" x="40" y="412" class="chunk"/><rect width="160" height="20" x="192" y="412" class="chunk"/><rect width="200" height="20" x="354" y="412" class="chunk"/><rect width="150" height="20" x="556" y="412" class="chunk"/><rect width="152" height="20" x="708" y="412" class="chunk"/><text x="450" y="450" class="caption" text-anchor="middle">pool token embeddings into chunk vectors — preserves cross-chunk context</text></svg>