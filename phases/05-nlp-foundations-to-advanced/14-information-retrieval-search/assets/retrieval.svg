<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 400"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.line{stroke:#1a1a1a;stroke-width:1.5;fill:none}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="140" height="50" x="380" y="20" class="box" rx="4"/><text x="450" y="50" class="label" text-anchor="middle">query</text><path marker-end="url(#arrow)" d="M 420 70 L 200 120" class="line"/><path marker-end="url(#arrow)" d="M 480 70 L 700 120" class="line"/><rect width="280" height="100" x="60" y="125" class="box" rx="4"/><text x="200" y="150" class="label" text-anchor="middle">BM25 (sparse)</text><text x="75" y="175" class="content">exact keyword, TF-IDF</text><text x="75" y="195" class="content">inverted index, sub-10ms</text><text x="200" y="215" class="note" text-anchor="middle">precise, brittle. zero OOV tolerance.</text><rect width="280" height="100" x="560" y="125" class="box" rx="4"/><text x="700" y="150" class="label" text-anchor="middle">Dense (bi-encoder)</text><text x="575" y="175" class="content">semantic similarity</text><text x="575" y="195" class="content">FAISS / vector DB, 50-200ms</text><text x="700" y="215" class="note" text-anchor="middle">paraphrase-tolerant, keyword-blind</text><path marker-end="url(#arrow)" d="M 200 225 L 380 260" class="line"/><path marker-end="url(#arrow)" d="M 700 225 L 520 260" class="line"/><rect width="140" height="50" x="380" y="260" class="hot" rx="4"/><text x="450" y="282" class="label" text-anchor="middle">RRF fusion</text><text x="450" y="300" class="content" text-anchor="middle">rank-only merge</text><path marker-end="url(#arrow)" d="M 450 310 L 450 340" class="line"/><rect width="300" height="50" x="300" y="340" class="hot" rx="4"/><text x="450" y="362" class="label" text-anchor="middle">cross-encoder rerank</text><text x="450" y="380" class="content" text-anchor="middle">top-30 → top-5. adds 30-100ms.</text></svg>