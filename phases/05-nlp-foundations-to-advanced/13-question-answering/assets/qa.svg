<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 420"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:11px;fill:#c0392b;font-style:italic;text-anchor:middle}.line{stroke:#1a1a1a;stroke-width:1.5;fill:none}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="280" height="380" x="20" y="20" class="box" rx="4"/><text x="160" y="45" class="label" text-anchor="middle">Extractive QA</text><text x="35" y="65" class="note">find answer span in given passage</text><rect width="240" height="70" x="35" y="85" class="box" rx="3"/><text x="45" y="105" class="content">question:</text><text x="45" y="125" class="content">&quot;When was iPhone released?&quot;</text><text x="45" y="145" class="content">context: [long passage]</text><path marker-end="url(#arrow)" d="M 155 155 L 155 180" class="line"/><rect width="240" height="50" x="35" y="180" class="hot" rx="3"/><text x="155" y="205" class="content" text-anchor="middle">BERT / RoBERTa + span head</text><text x="155" y="220" class="content" text-anchor="middle">predict (start_idx, end_idx)</text><path marker-end="url(#arrow)" d="M 155 230 L 155 255" class="line"/><rect width="240" height="50" x="35" y="255" class="box" rx="3"/><text x="155" y="280" class="content" text-anchor="middle">&quot;June 29, 2007&quot;</text><text x="155" y="295" class="content" text-anchor="middle">verbatim span, never invents</text><text x="160" y="340" class="stage">SQuAD-style. never hallucinates.</text><text x="160" y="360" class="note" text-anchor="middle">needs passage + question together.</text><text x="160" y="378" class="note" text-anchor="middle">fails on unanswerable questions</text><text x="160" y="392" class="note" text-anchor="middle">unless SQuAD 2.0-trained.</text><rect width="280" height="380" x="320" y="20" class="box" rx="4"/><text x="460" y="45" class="label" text-anchor="middle">RAG</text><text x="335" y="65" class="note">retrieve passages, then answer</text><rect width="240" height="40" x="335" y="85" class="box" rx="3"/><text x="455" y="110" class="content" text-anchor="middle">question only</text><path marker-end="url(#arrow)" d="M 455 125 L 455 145" class="line"/><rect width="240" height="50" x="335" y="145" class="hot" rx="3"/><text x="455" y="170" class="content" text-anchor="middle">retriever</text><text x="455" y="185" class="content" text-anchor="middle">BM25 + dense + rerank</text><path marker-end="url(#arrow)" d="M 455 195 L 455 215" class="line"/><rect width="240" height="50" x="335" y="215" class="box" rx="3"/><text x="455" y="240" class="content" text-anchor="middle">top-k passages</text><text x="455" y="255" class="content" text-anchor="middle">(grounding context)</text><path marker-end="url(#arrow)" d="M 455 265 L 455 285" class="line"/><rect width="240" height="50" x="335" y="285" class="hot" rx="3"/><text x="455" y="310" class="content" text-anchor="middle">reader (LLM or extractive)</text><path marker-end="url(#arrow)" d="M 455 335 L 455 355" class="line"/><rect width="240" height="35" x="335" y="355" class="box" rx="3"/><text x="455" y="377" class="content" text-anchor="middle">grounded answer + citations</text><rect width="260" height="380" x="620" y="20" class="box" rx="4"/><text x="750" y="45" class="label" text-anchor="middle">Generative (closed-book)</text><text x="635" y="65" class="note">answer from model weights</text><rect width="230" height="40" x="635" y="85" class="box" rx="3"/><text x="750" y="110" class="content" text-anchor="middle">question</text><path marker-end="url(#arrow)" d="M 750 125 L 750 145" class="line"/><rect width="230" height="90" x="635" y="145" class="hot" rx="3"/><text x="750" y="170" class="content" text-anchor="middle">decoder-only LLM</text><text x="750" y="190" class="content" text-anchor="middle">(GPT, Claude, Llama)</text><text x="750" y="215" class="content" text-anchor="middle">parametric memory only</text><path marker-end="url(#arrow)" d="M 750 235 L 750 255" class="line"/><rect width="230" height="50" x="635" y="255" class="box" rx="3"/><text x="750" y="280" class="content" text-anchor="middle">free-form answer</text><text x="750" y="295" class="content" text-anchor="middle">(may hallucinate)</text><text x="750" y="350" class="note" text-anchor="middle">good on common knowledge.</text><text x="750" y="370" class="note" text-anchor="middle">bad on rare / recent facts.</text><text x="750" y="390" class="note" text-anchor="middle">needs RAG for reliability.</text></svg>