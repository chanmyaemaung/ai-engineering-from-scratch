<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.state,.user{stroke-width:1.5}.user{fill:#e3f2fd;stroke:#1565c0}.state{fill:#fff1d6;stroke:#c0392b}.slot-filled{fill:#e8f5e9;stroke:#2e7d32;stroke-width:1}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.mono{font-size:12px;fill:#333}.mono{font-size:11px;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="28" class="title" text-anchor="middle">dialogue state tracking — slots fill, update, correct across turns</text><text x="50" y="65" class="label">turn 1</text><rect width="360" height="30" x="100" y="50" class="user"/><text x="280" y="70" class="content" text-anchor="middle">&quot;I want a cheap restaurant in the north.&quot;</text><line x1="465" x2="500" y1="65" y2="65" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="40" x="505" y="45" class="state"/><text x="555" y="60" class="mono" text-anchor="middle">cuisine: —</text><text x="555" y="78" class="mono" text-anchor="middle">area: north</text><rect width="100" height="40" x="610" y="45" class="state"/><text x="660" y="60" class="mono" text-anchor="middle">price: cheap</text><text x="660" y="78" class="mono" text-anchor="middle">people: —</text><text x="50" y="130" class="label">turn 2</text><rect width="360" height="30" x="100" y="115" class="user"/><text x="280" y="135" class="content" text-anchor="middle">&quot;Italian food please.&quot;</text><line x1="465" x2="500" y1="130" y2="130" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="40" x="505" y="110" class="slot-filled"/><text x="555" y="125" class="mono" text-anchor="middle">cuisine: italian</text><text x="555" y="143" class="mono" text-anchor="middle">area: north</text><rect width="100" height="40" x="610" y="110" class="state"/><text x="660" y="125" class="mono" text-anchor="middle">price: cheap</text><text x="660" y="143" class="mono" text-anchor="middle">people: —</text><text x="50" y="195" class="label">turn 3</text><rect width="360" height="30" x="100" y="180" class="user"/><text x="280" y="200" class="content" text-anchor="middle">&quot;Actually make it moderate pricing.&quot;</text><line x1="465" x2="500" y1="195" y2="195" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="40" x="505" y="175" class="state"/><text x="555" y="190" class="mono" text-anchor="middle">cuisine: italian</text><text x="555" y="208" class="mono" text-anchor="middle">area: north</text><rect width="100" height="40" x="610" y="175" class="slot-filled"/><text x="660" y="190" class="mono" text-anchor="middle">price: moderate</text><text x="660" y="208" class="mono" text-anchor="middle">people: —</text><text x="50" y="260" class="label">turn 4</text><rect width="360" height="30" x="100" y="245" class="user"/><text x="280" y="265" class="content" text-anchor="middle">&quot;For four people.&quot;</text><line x1="465" x2="500" y1="260" y2="260" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="100" height="40" x="505" y="240" class="state"/><text x="555" y="255" class="mono" text-anchor="middle">cuisine: italian</text><text x="555" y="273" class="mono" text-anchor="middle">area: north</text><rect width="100" height="40" x="610" y="240" class="slot-filled"/><text x="660" y="255" class="mono" text-anchor="middle">price: moderate</text><text x="660" y="273" class="mono" text-anchor="middle">people: 4</text><rect width="700" height="70" x="100" y="320" class="box"/><text x="450" y="345" class="label" text-anchor="middle">final state (JGA counts if and only if all slots match gold)</text><text x="450" y="370" class="mono" text-anchor="middle">{cuisine: italian, area: north, price: moderate, people: 4}</text><text x="450" y="385" class="caption" text-anchor="middle">→ pass to backend: book_restaurant(cuisine=italian, area=north, price=moderate, people=4)</text><text x="450" y="425" class="caption" text-anchor="middle">invariants — correction overwrites (turn 3); explicit negation clears; untouched slots persist</text></svg>