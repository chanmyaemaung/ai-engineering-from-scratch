<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 400"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><marker id="red-arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#c0392b" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b;stroke-width:2}.cell{fill:#f3ece0;stroke:#1a1a1a;stroke-width:1.2}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:12px;fill:#c0392b;font-style:italic;text-anchor:middle}.line,.red{stroke:#1a1a1a;stroke-width:1.5;fill:none}.red{stroke:#c0392b;stroke-width:2}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="380" height="320" x="20" y="40" class="box" rx="4"/><text x="210" y="65" class="label" text-anchor="middle">encoder (GRU)</text><rect width="50" height="35" x="50" y="90" class="cell" rx="2"/><text x="75" y="113" class="content" text-anchor="middle">h1</text><rect width="50" height="35" x="120" y="90" class="cell" rx="2"/><text x="145" y="113" class="content" text-anchor="middle">h2</text><rect width="50" height="35" x="190" y="90" class="cell" rx="2"/><text x="215" y="113" class="content" text-anchor="middle">h3</text><rect width="50" height="35" x="260" y="90" class="cell" rx="2"/><text x="285" y="113" class="content" text-anchor="middle">h4</text><rect width="50" height="35" x="330" y="90" class="hot" rx="2"/><text x="355" y="113" class="content" text-anchor="middle">h5</text><path marker-end="url(#arrow)" d="M 100 108 L 118 108" class="line"/><path marker-end="url(#arrow)" d="M 170 108 L 188 108" class="line"/><path marker-end="url(#arrow)" d="M 240 108 L 258 108" class="line"/><path marker-end="url(#arrow)" d="M 310 108 L 328 108" class="line"/><rect width="50" height="30" x="50" y="160" class="cell" rx="2"/><text x="75" y="180" class="content" text-anchor="middle">Je</text><rect width="50" height="30" x="120" y="160" class="cell" rx="2"/><text x="145" y="180" class="content" text-anchor="middle">ne</text><rect width="50" height="30" x="190" y="160" class="cell" rx="2"/><text x="215" y="180" class="content" text-anchor="middle">suis</text><rect width="50" height="30" x="260" y="160" class="cell" rx="2"/><text x="285" y="180" class="content" text-anchor="middle">pas</text><rect width="50" height="30" x="330" y="160" class="cell" rx="2"/><text x="355" y="180" class="content" text-anchor="middle">chat</text><path d="M 75 160 L 75 130" class="line"/><path d="M 145 160 L 145 130" class="line"/><path d="M 215 160 L 215 130" class="line"/><path d="M 285 160 L 285 130" class="line"/><path d="M 355 160 L 355 130" class="line"/><text x="210" y="230" class="stage">final state = context vector</text><text x="210" y="250" class="note" text-anchor="middle">fixed size, no matter how long the input</text><path marker-end="url(#red-arrow)" d="M 382 108 L 490 220" class="red"/><text x="430" y="180" class="stage">bottleneck</text><rect width="380" height="320" x="500" y="40" class="box" rx="4"/><text x="690" y="65" class="label" text-anchor="middle">decoder (GRU)</text><rect width="50" height="35" x="520" y="220" class="hot" rx="2"/><text x="545" y="243" class="content" text-anchor="middle">h5</text><rect width="50" height="35" x="590" y="220" class="cell" rx="2"/><text x="615" y="243" class="content" text-anchor="middle">s1</text><rect width="50" height="35" x="660" y="220" class="cell" rx="2"/><text x="685" y="243" class="content" text-anchor="middle">s2</text><rect width="50" height="35" x="730" y="220" class="cell" rx="2"/><text x="755" y="243" class="content" text-anchor="middle">s3</text><rect width="50" height="35" x="800" y="220" class="cell" rx="2"/><text x="825" y="243" class="content" text-anchor="middle">s4</text><path marker-end="url(#arrow)" d="M 570 238 L 588 238" class="line"/><path marker-end="url(#arrow)" d="M 640 238 L 658 238" class="line"/><path marker-end="url(#arrow)" d="M 710 238 L 728 238" class="line"/><path marker-end="url(#arrow)" d="M 780 238 L 798 238" class="line"/><rect width="50" height="30" x="590" y="290" class="cell" rx="2"/><text x="615" y="310" class="content" text-anchor="middle">I</text><rect width="50" height="30" x="660" y="290" class="cell" rx="2"/><text x="685" y="310" class="content" text-anchor="middle">am</text><rect width="50" height="30" x="730" y="290" class="cell" rx="2"/><text x="755" y="310" class="content" text-anchor="middle">not</text><rect width="50" height="30" x="800" y="290" class="cell" rx="2"/><text x="825" y="310" class="content" text-anchor="middle">cat</text><path d="M 615 290 L 615 255" class="line"/><path d="M 685 290 L 685 255" class="line"/><path d="M 755 290 L 755 255" class="line"/><path d="M 825 290 L 825 255" class="line"/><text x="690" y="350" class="note" text-anchor="middle">emits one token per step, feeds it back in</text></svg>