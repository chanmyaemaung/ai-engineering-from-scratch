<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 420"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.emb{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.emb{fill:#f3ece0;stroke-width:1.2}.filter{fill:none;stroke:#c0392b;stroke-width:2;stroke-dasharray:4,3}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.stage{font-size:12px;fill:#c0392b;font-style:italic;text-anchor:middle}.line,.rnn{stroke:#1a1a1a;stroke-width:1.5;fill:none}.note{font-size:11px;fill:#666;font-style:italic}</style></defs><rect width="420" height="380" x="20" y="20" class="box" rx="4"/><text x="230" y="45" class="label" text-anchor="middle">TextCNN</text><text x="40" y="65" class="note">filters are learnable n-grams</text><rect width="70" height="30" x="40" y="80" class="emb" rx="2"/><text x="75" y="100" class="content" text-anchor="middle">the</text><rect width="70" height="30" x="115" y="80" class="emb" rx="2"/><text x="150" y="100" class="content" text-anchor="middle">cat</text><rect width="70" height="30" x="190" y="80" class="emb" rx="2"/><text x="225" y="100" class="content" text-anchor="middle">sat</text><rect width="70" height="30" x="265" y="80" class="emb" rx="2"/><text x="300" y="100" class="content" text-anchor="middle">on</text><rect width="70" height="30" x="340" y="80" class="emb" rx="2"/><text x="375" y="100" class="content" text-anchor="middle">mat</text><rect width="155" height="40" x="35" y="75" class="filter" rx="2"/><text x="110" y="138" fill="#c0392b" class="content" text-anchor="middle">filter w=2</text><rect width="230" height="40" x="110" y="150" class="filter" rx="2"/><text x="225" y="210" fill="#c0392b" class="content" text-anchor="middle">filter w=3</text><rect width="230" height="40" x="185" y="220" class="filter" rx="2"/><text x="300" y="280" fill="#c0392b" class="content" text-anchor="middle">filter w=4</text><path marker-end="url(#arrow)" d="M 230 290 L 230 320" class="line"/><text x="230" y="340" class="stage">max-pool + concat</text><rect width="160" height="30" x="150" y="355" fill="#fff1d6" class="box" rx="3"/><text x="230" y="375" class="content" text-anchor="middle">fixed-size vector</text><rect width="420" height="380" x="460" y="20" class="box" rx="4"/><text x="670" y="45" class="label" text-anchor="middle">LSTM</text><text x="475" y="65" class="note">hidden state carries info forward</text><circle cx="510" cy="150" r="18" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1.5"/><text x="510" y="155" class="content" text-anchor="middle">h1</text><circle cx="580" cy="150" r="18" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1.5"/><text x="580" y="155" class="content" text-anchor="middle">h2</text><circle cx="650" cy="150" r="18" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1.5"/><text x="650" y="155" class="content" text-anchor="middle">h3</text><circle cx="720" cy="150" r="18" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1.5"/><text x="720" y="155" class="content" text-anchor="middle">h4</text><circle cx="790" cy="150" r="18" fill="#f3ece0" stroke="#1a1a1a" stroke-width="1.5"/><text x="790" y="155" class="content" text-anchor="middle">h5</text><path marker-end="url(#arrow)" d="M 528 150 L 562 150" class="rnn"/><path marker-end="url(#arrow)" d="M 598 150 L 632 150" class="rnn"/><path marker-end="url(#arrow)" d="M 668 150 L 702 150" class="rnn"/><path marker-end="url(#arrow)" d="M 738 150 L 772 150" class="rnn"/><rect width="40" height="30" x="490" y="210" class="emb" rx="2"/><text x="510" y="230" class="content" text-anchor="middle">the</text><rect width="40" height="30" x="560" y="210" class="emb" rx="2"/><text x="580" y="230" class="content" text-anchor="middle">cat</text><rect width="40" height="30" x="630" y="210" class="emb" rx="2"/><text x="650" y="230" class="content" text-anchor="middle">sat</text><rect width="40" height="30" x="700" y="210" class="emb" rx="2"/><text x="720" y="230" class="content" text-anchor="middle">on</text><rect width="40" height="30" x="770" y="210" class="emb" rx="2"/><text x="790" y="230" class="content" text-anchor="middle">mat</text><path d="M 510 210 L 510 170" class="line"/><path d="M 580 210 L 580 170" class="line"/><path d="M 650 210 L 650 170" class="line"/><path d="M 720 210 L 720 170" class="line"/><path d="M 790 210 L 790 170" class="line"/><text x="670" y="285" class="stage">pool h1..h5 → classifier</text><text x="475" y="320" class="note">gates decide what to keep / forget</text><text x="475" y="340" class="note">still fails past ~200 steps</text><text x="475" y="360" class="note">sequential = no parallelism</text><text x="475" y="380" class="note">→ attention came next</text></svg>