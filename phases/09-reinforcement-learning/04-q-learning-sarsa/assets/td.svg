<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e8f1fb;stroke:#2471a3}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">Q-learning vs SARSA — one line of code apart</text><rect width="820" height="70" x="40" y="60" class="box"/><text x="60" y="85" class="label">the transition</text><text x="60" y="108" class="content">(s, a) --env.step--&gt; (r, s&apos;) (one step, online, no episode boundary needed)</text><rect width="400" height="180" x="40" y="150" class="hot"/><text x="240" y="175" class="label" text-anchor="middle">Q-learning (off-policy)</text><text x="60" y="205" class="content">target = r + gamma * max_{a&apos;} Q(s&apos;, a&apos;)</text><text x="60" y="228" class="content">Q(s, a) += alpha * (target - Q(s, a))</text><text x="60" y="260" class="caption">assumes greedy policy from s&apos; onward</text><text x="60" y="278" class="caption">learns Q* even while exploring</text><text x="60" y="300" class="caption">max bias: overestimates noisy Q</text><text x="60" y="320" class="caption">deep version: DQN</text><rect width="400" height="180" x="460" y="150" class="cool"/><text x="660" y="175" class="label" text-anchor="middle">SARSA (on-policy)</text><text x="480" y="205" class="content">a&apos; = epsilon_greedy(Q, s&apos;)</text><text x="480" y="228" class="content">target = r + gamma * Q(s&apos;, a&apos;)</text><text x="480" y="251" class="content">Q(s, a) += alpha * (target - Q(s, a))</text><text x="480" y="283" class="caption">uses the ACTION actually taken</text><text x="480" y="301" class="caption">learns Q^pi for current epsilon-greedy</text><text x="480" y="319" class="caption">conservative near cliffs / danger</text><rect width="820" height="70" x="40" y="350" class="box"/><text x="450" y="375" class="label" text-anchor="middle">same shape: target - Q(s,a), scaled by alpha</text><text x="450" y="398" class="caption" text-anchor="middle">the ONE symbol difference: max vs sampled a&apos; — off-policy vs on-policy</text><text x="450" y="450" class="caption" text-anchor="middle">everything in Phase 9 after this lesson is deep-function-approximated variants of these two updates</text></svg>