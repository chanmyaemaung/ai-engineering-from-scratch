<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">the MDP loop: five objects, one recursion</text><rect width="160" height="90" x="40" y="70" class="box"/><text x="120" y="98" class="label" text-anchor="middle">state s_t</text><text x="120" y="120" class="content" text-anchor="middle">what agent sees</text><text x="120" y="140" class="content" text-anchor="middle">Markov sufficient</text><rect width="160" height="90" x="260" y="70" class="hot"/><text x="340" y="98" class="label" text-anchor="middle">policy pi(a | s)</text><text x="340" y="120" class="content" text-anchor="middle">chooses action</text><text x="340" y="140" class="content" text-anchor="middle">a_t ~ pi(. | s_t)</text><rect width="160" height="90" x="480" y="70" class="box"/><text x="560" y="98" class="label" text-anchor="middle">transition P</text><text x="560" y="120" class="content" text-anchor="middle">s_{t+1} ~ P(. | s_t, a_t)</text><text x="560" y="140" class="content" text-anchor="middle">env dynamics</text><rect width="160" height="90" x="700" y="70" class="box"/><text x="780" y="98" class="label" text-anchor="middle">reward r_t</text><text x="780" y="120" class="content" text-anchor="middle">scalar signal</text><text x="780" y="140" class="content" text-anchor="middle">R(s_t, a_t, s_{t+1})</text><line x1="200" x2="258" y1="115" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="420" x2="478" y1="115" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><line x1="640" x2="698" y1="115" y2="115" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><path fill="none" stroke="#1a1a1a" stroke-dasharray="5 3" stroke-width="1.5" marker-end="url(#arrow)" d="M 780 160 Q 780 230 450 260 Q 120 290 120 160"/><text x="450" y="248" class="caption" text-anchor="middle">next step: s_{t+1} becomes the new s_t</text><rect width="820" height="130" x="40" y="300" class="box"/><text x="450" y="325" class="label" text-anchor="middle">the Bellman recursion</text><text x="450" y="352" class="content" text-anchor="middle">V^pi(s) = sum_a pi(a|s) · sum_{s&apos;,r} P(s&apos;,r | s,a) · [ r + gamma · V^pi(s&apos;) ]</text><text x="450" y="378" class="content" text-anchor="middle">Q^pi(s,a) = sum_{s&apos;,r} P(s&apos;,r | s,a) · [ r + gamma · sum_{a&apos;} pi(a&apos;|s&apos;) · Q^pi(s&apos;,a&apos;) ]</text><text x="450" y="408" class="caption" text-anchor="middle">iterate to fixed point (DP) · sample (MC) · bootstrap one step (TD)</text><text x="450" y="450" class="caption" text-anchor="middle">state + action + transition + reward + discount — every RL algorithm in this phase</text></svg>