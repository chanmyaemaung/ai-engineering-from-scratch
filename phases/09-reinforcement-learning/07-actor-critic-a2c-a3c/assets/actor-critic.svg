<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e8f1fb;stroke:#2471a3}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">actor-critic: policy + value, trained together</text><rect width="820" height="60" x="40" y="60" class="box"/><text x="60" y="85" class="label">shared state features x = phi(s)</text><text x="60" y="105" class="caption">MLP trunk, CNN on pixels, transformer on tokens — same input, two heads</text><rect width="400" height="180" x="40" y="140" class="hot"/><text x="240" y="165" class="label" text-anchor="middle">actor pi_theta(a | s)</text><text x="60" y="195" class="content">logits = f_theta(x)</text><text x="60" y="215" class="content">p = softmax(logits)</text><text x="60" y="245" class="content">loss: -A * log pi(a|s)</text><text x="60" y="265" class="content">+ c_e * H(pi(.|s))</text><text x="240" y="295" class="caption" text-anchor="middle">policy gradient, on-policy</text><rect width="400" height="180" x="460" y="140" class="cool"/><text x="660" y="165" class="label" text-anchor="middle">critic V_phi(s)</text><text x="480" y="195" class="content">v_hat = w . x</text><text x="480" y="215" class="content">target = G_t (MC)</text><text x="480" y="235" class="content">or r + g V(s&apos;) (TD)</text><text x="480" y="265" class="content">loss: c_v * (v_hat - target)^2</text><text x="660" y="295" class="caption" text-anchor="middle">MSE regression to return</text><rect width="820" height="80" x="40" y="340" class="box"/><text x="60" y="365" class="label">advantage estimator A_t</text><text x="60" y="388" class="content">A_t = delta_t + (g * lam) * A_{t+1} delta_t = r_{t+1} + g V(s_{t+1}) - V(s_t)</text><text x="60" y="410" class="caption">GAE(lam): lam=0 pure TD, lam=1 pure MC, lam=0.95 the 2026 default</text><text x="450" y="450" class="caption" text-anchor="middle">subtract V from return, normalize, multiply by grad log pi — lower variance, same gradient</text></svg>