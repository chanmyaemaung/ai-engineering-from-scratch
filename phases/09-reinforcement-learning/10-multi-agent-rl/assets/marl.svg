<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e8f1fb;stroke:#2471a3}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">four MARL regimes, same environment shape</text><rect width="200" height="170" x="40" y="60" class="box"/><text x="140" y="88" class="label" text-anchor="middle">independent PPO / Q</text><text x="60" y="115" class="content">each agent has its own</text><text x="60" y="135" class="content">policy and critic</text><text x="60" y="160" class="content">treats others as env</text><text x="140" y="195" class="caption" text-anchor="middle">simple, no coord signal</text><text x="140" y="215" class="caption" text-anchor="middle">fails on tight coupling</text><rect width="200" height="170" x="260" y="60" class="hot"/><text x="360" y="88" class="label" text-anchor="middle">CTDE (MAPPO/QMIX)</text><text x="280" y="115" class="content">decentralized actor:</text><text x="280" y="133" class="content">pi_i(a_i | o_i)</text><text x="280" y="158" class="content">centralized critic:</text><text x="280" y="176" class="content">Q(s, a_1, .., a_n)</text><text x="360" y="210" class="caption" text-anchor="middle">2026 cooperative default</text><rect width="200" height="170" x="480" y="60" class="cool"/><text x="580" y="88" class="label" text-anchor="middle">self-play</text><text x="500" y="115" class="content">single agent, two roles</text><text x="500" y="135" class="content">opponent = past snapshot</text><text x="500" y="160" class="content">symmetric gradients</text><text x="580" y="195" class="caption" text-anchor="middle">zero-sum games</text><text x="580" y="215" class="caption" text-anchor="middle">AlphaGo / AlphaZero</text><rect width="160" height="170" x="700" y="60" class="box"/><text x="780" y="88" class="label" text-anchor="middle">league play</text><text x="715" y="115" class="content">population of</text><text x="715" y="133" class="content">past + current</text><text x="715" y="153" class="content">policies; sample</text><text x="715" y="171" class="content">opponents</text><text x="780" y="210" class="caption" text-anchor="middle">AlphaStar</text><rect width="820" height="150" x="40" y="260" class="box"/><text x="450" y="285" class="label" text-anchor="middle">the core difficulty</text><text x="60" y="315" class="content">from agent i&apos;s view, the environment now includes pi_{-i}</text><text x="60" y="335" class="content">as pi_{-i} learns, the transition P(s&apos; | s, a_i) is non-stationary</text><text x="60" y="355" class="content">Markov property breaks -&gt; tabular convergence proofs no longer apply</text><text x="60" y="378" class="caption">CTDE fixes this by conditioning the critic on the full joint action; self-play fixes it by structure</text><text x="450" y="445" class="caption" text-anchor="middle">add communication, language, or MCTS and you get StarCraft II / Dota 2 / multi-agent LLM systems</text></svg>