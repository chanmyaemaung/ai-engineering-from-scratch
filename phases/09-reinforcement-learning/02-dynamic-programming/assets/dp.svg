<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box,.hot{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">two DP algorithms, one fixed point</text><rect width="380" height="370" x="40" y="60" class="box"/><text x="230" y="85" class="label" text-anchor="middle">policy iteration</text><text x="230" y="102" class="caption" text-anchor="middle">outer loop over (evaluate, improve)</text><rect width="320" height="50" x="70" y="125" class="hot"/><text x="230" y="146" class="content" text-anchor="middle">1. evaluate: V^pi until convergence</text><text x="230" y="162" class="content" text-anchor="middle">V(s) &lt;- sum pi(a) sum P (r + g V(s&apos;))</text><line x1="230" x2="230" y1="180" y2="198" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="320" height="50" x="70" y="203" class="hot"/><text x="230" y="224" class="content" text-anchor="middle">2. improve: pi(s) &lt;- argmax_a Q(s,a)</text><text x="230" y="240" class="content" text-anchor="middle">greedy w.r.t. current V</text><line x1="230" x2="230" y1="258" y2="278" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="320" height="40" x="70" y="283" class="box"/><text x="230" y="308" class="content" text-anchor="middle">3. stop if pi unchanged</text><text x="230" y="355" class="caption" text-anchor="middle">few outer iters (5-20)</text><text x="230" y="375" class="caption" text-anchor="middle">each inner eval is expensive</text><text x="230" y="400" class="caption" text-anchor="middle">guarantee: monotone V improvement</text><rect width="380" height="370" x="480" y="60" class="box"/><text x="670" y="85" class="label" text-anchor="middle">value iteration</text><text x="670" y="102" class="caption" text-anchor="middle">one loop, Bellman optimality backup</text><rect width="320" height="60" x="510" y="125" class="hot"/><text x="670" y="148" class="content" text-anchor="middle">V(s) &lt;- max_a sum P (r + g V(s&apos;))</text><text x="670" y="168" class="content" text-anchor="middle">applied to every state, every sweep</text><line x1="670" x2="670" y1="192" y2="212" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="320" height="50" x="510" y="217" class="hot"/><text x="670" y="238" class="content" text-anchor="middle">stop when max_s |dV(s)| &lt; eps</text><text x="670" y="254" class="content" text-anchor="middle">sup-norm contraction by factor g</text><line x1="670" x2="670" y1="272" y2="292" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)"/><rect width="320" height="40" x="510" y="297" class="box"/><text x="670" y="322" class="content" text-anchor="middle">extract greedy pi from V*</text><text x="670" y="355" class="caption" text-anchor="middle">more sweeps (often 100+)</text><text x="670" y="375" class="caption" text-anchor="middle">each sweep O(|S| * |A|)</text><text x="670" y="400" class="caption" text-anchor="middle">convergence: ||T V - V*|| &lt;= g^k ||V_0 - V*||</text><text x="450" y="450" class="caption" text-anchor="middle">both land at V* — different paths, same fixed point (generalized policy iteration)</text></svg>