<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e8f1fb;stroke:#2471a3}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333;font-family:&apos;Menlo&apos;,monospace}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="30" class="title" text-anchor="middle">three ways to close the reality gap</text><rect width="820" height="70" x="40" y="60" class="hot"/><text x="60" y="85" class="label">the reality gap</text><text x="60" y="108" class="content">sim physics approx = real physics + epsilon (friction, delay, lighting, noise, ...)</text><rect width="260" height="240" x="40" y="150" class="box"/><text x="170" y="178" class="label" text-anchor="middle">domain randomization</text><text x="60" y="205" class="content">theta_sim ~ P(theta)</text><text x="60" y="225" class="content">train over many sims</text><text x="60" y="245" class="content">policy sees random gravity,</text><text x="60" y="265" class="content">mass, friction, motor gain</text><text x="170" y="300" class="caption" text-anchor="middle">zero real data needed</text><text x="170" y="320" class="caption" text-anchor="middle">OpenAI Dactyl (rubik&apos;s cube)</text><text x="170" y="345" class="caption" text-anchor="middle">over-rand. -&gt; cautious</text><text x="170" y="365" class="caption" text-anchor="middle">under-rand. -&gt; brittle</text><rect width="260" height="240" x="320" y="150" class="cool"/><text x="450" y="178" class="label" text-anchor="middle">system identification</text><text x="340" y="205" class="content">measure real:</text><text x="340" y="225" class="content">friction, delays, gains</text><text x="340" y="245" class="content">plug into sim</text><text x="340" y="265" class="content">train on matched sim</text><text x="450" y="300" class="caption" text-anchor="middle">low noise, precise</text><text x="450" y="320" class="caption" text-anchor="middle">but residual error invisible</text><text x="450" y="345" class="caption" text-anchor="middle">to the policy</text><rect width="260" height="240" x="600" y="150" class="box"/><text x="730" y="178" class="label" text-anchor="middle">teacher / student</text><text x="620" y="205" class="content">teacher: privileged info</text><text x="620" y="225" class="content">terrain, ground truth</text><text x="620" y="245" class="content">student: only sensor obs</text><text x="620" y="265" class="content">distill teacher -&gt; student</text><text x="730" y="300" class="caption" text-anchor="middle">ANYmal, Boston Dynamics</text><text x="730" y="320" class="caption" text-anchor="middle">robust across physical</text><text x="730" y="345" class="caption" text-anchor="middle">parameters + obs noise</text><text x="450" y="435" class="caption" text-anchor="middle">2026 recipe: GPU-parallel sim + DR + teacher/student + safety shield on real hardware</text></svg>