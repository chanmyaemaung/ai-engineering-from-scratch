<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 900 460"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold{fill:#eaf4ff;stroke:#2c5f8c}.label{font-size:14px;font-weight:600;fill:#1a1a1a}.content{font-size:12px;fill:#333}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="450" y="28" class="title" text-anchor="middle">adversarial training: two networks, one loss</text><rect width="80" height="50" x="40" y="100" class="box"/><text x="80" y="128" class="content" text-anchor="middle">z ~ N(0, I)</text><line x1="120" x2="170" y1="125" y2="125" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/><rect width="120" height="70" x="170" y="90" class="cold"/><text x="230" y="118" class="label" text-anchor="middle">G(z)</text><text x="230" y="138" class="caption" text-anchor="middle">generator</text><line x1="290" x2="340" y1="125" y2="125" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/><rect width="80" height="50" x="340" y="100" class="box"/><text x="380" y="128" class="content" text-anchor="middle">x̂ (fake)</text><rect width="80" height="50" x="340" y="220" class="box"/><text x="380" y="248" class="content" text-anchor="middle">x (real)</text><line x1="420" x2="470" y1="125" y2="140" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/><line x1="420" x2="470" y1="245" y2="220" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/><rect width="130" height="90" x="470" y="135" class="hot"/><text x="535" y="170" class="label" text-anchor="middle">D(x)</text><text x="535" y="195" class="caption" text-anchor="middle">discriminator</text><text x="535" y="215" class="caption" text-anchor="middle">real? 0-1</text><line x1="600" x2="660" y1="180" y2="180" stroke="#1a1a1a" stroke-width="1.2" marker-end="url(#arrow)"/><rect width="200" height="60" x="660" y="150" class="box"/><text x="760" y="180" class="label" text-anchor="middle">BCE loss</text><text x="760" y="200" class="caption" text-anchor="middle">real -&gt; 1, fake -&gt; 0</text><rect width="820" height="50" x="40" y="300" class="box"/><text x="450" y="320" class="label" text-anchor="middle">minimax: min_G max_D E_real[log D(x)] + E_fake[log(1 - D(G(z)))]</text><text x="450" y="340" class="caption" text-anchor="middle">use non-saturating G loss -log D(G(z)) to avoid vanishing gradients</text><rect width="400" height="70" x="40" y="370" class="hot"/><text x="240" y="392" class="label" text-anchor="middle">failure: D wins</text><text x="240" y="412" class="caption" text-anchor="middle">D(fake) → 0, gradient to G vanishes</text><text x="240" y="428" class="caption" text-anchor="middle">fix: cut D lr, add input noise, WGAN</text><rect width="400" height="70" x="460" y="370" class="hot"/><text x="660" y="392" class="label" text-anchor="middle">failure: G collapses</text><text x="660" y="412" class="caption" text-anchor="middle">G outputs one mode, D can&apos;t penalize</text><text x="660" y="428" class="caption" text-anchor="middle">fix: minibatch disc, spectral norm, PacGAN</text></svg>