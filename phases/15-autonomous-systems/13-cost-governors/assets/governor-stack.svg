<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.cool,.hot,.warn{stroke-width:1.5}.warn{fill:#fde0b4;stroke:#b5651d}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Cost governors layer by time scale. Each layer catches a distinct failure.</text><rect width="800" height="460" x="40" y="50" class="box"/><text x="60" y="80" class="label">time scale</text><text x="240" y="80" class="label">layer</text><text x="500" y="80" class="label">catches</text><rect width="160" height="40" x="60" y="90" class="cool"/><text x="140" y="115" class="small" text-anchor="middle">per request (&lt;1 s)</text><rect width="240" height="40" x="230" y="90" class="cold"/><text x="350" y="115" class="content" text-anchor="middle">max_tokens</text><rect width="340" height="40" x="480" y="90" class="box"/><text x="650" y="115" class="small" text-anchor="middle">unbounded completion (single LLM call)</text><rect width="160" height="40" x="60" y="135" class="cool"/><text x="140" y="160" class="small" text-anchor="middle">per session (min)</text><rect width="240" height="40" x="230" y="135" class="cold"/><text x="350" y="160" class="content" text-anchor="middle">max_turns, max_budget_usd</text><rect width="340" height="40" x="480" y="135" class="box"/><text x="650" y="160" class="small" text-anchor="middle">long reasoning loop in one session</text><rect width="160" height="40" x="60" y="180" class="cool"/><text x="140" y="205" class="small" text-anchor="middle">per tool (sess.)</text><rect width="240" height="40" x="230" y="180" class="cold"/><text x="350" y="205" class="content" text-anchor="middle">per-tool cap (e.g., ≤5 WebFetch)</text><rect width="340" height="40" x="480" y="180" class="box"/><text x="650" y="205" class="small" text-anchor="middle">new tool triggers new loop (e.g. order-track)</text><rect width="160" height="40" x="60" y="225" class="warn"/><text x="140" y="250" class="small" text-anchor="middle">velocity (10 min)</text><rect width="240" height="40" x="230" y="225" class="cold"/><text x="350" y="250" class="content" text-anchor="middle">cut off above $50 / 10 min</text><rect width="340" height="40" x="480" y="225" class="box"/><text x="650" y="250" class="small" text-anchor="middle">runaway loop; fast-burn</text><rect width="160" height="40" x="60" y="270" class="hot"/><text x="140" y="295" class="small" text-anchor="middle">per day</text><rect width="240" height="40" x="230" y="270" class="cold"/><text x="350" y="295" class="content" text-anchor="middle">rolling daily cap + alert</text><rect width="340" height="40" x="480" y="270" class="box"/><text x="650" y="295" class="small" text-anchor="middle">slow leak; gradual doubling</text><rect width="160" height="40" x="60" y="315" class="hot"/><text x="140" y="340" class="small" text-anchor="middle">per week/month</text><rect width="240" height="40" x="230" y="315" class="cold"/><text x="350" y="340" class="content" text-anchor="middle">hard monthly cap + weekly alert</text><rect width="340" height="40" x="480" y="315" class="box"/><text x="650" y="340" class="small" text-anchor="middle">bad release; regression across sessions</text><rect width="760" height="54" x="60" y="370" class="cool"/><text x="440" y="392" class="label" text-anchor="middle">orthogonal: cost reduction at constant quality</text><text x="80" y="412" class="content">prompt caching · context windowing / compaction · tiered model routing · parallel cache for long-horizon runs</text><rect width="760" height="60" x="60" y="430" class="hot"/><text x="440" y="452" class="label" text-anchor="middle">kill switch on breach</text><text x="80" y="472" class="content">any cap fires → session aborts → alert → manual re-enable required → agent cannot modify its own cap</text><text x="80" y="486" class="small">observed 2026: e-commerce agent $1,200 → $4,800 after tool addition; weekly-growth alert was the fix.</text></svg>