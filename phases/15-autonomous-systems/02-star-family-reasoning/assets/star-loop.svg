<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 560"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">STaR bootstrap loop (and how shortcuts sneak in)</text><rect width="380" height="480" x="40" y="56" class="box"/><text x="230" y="80" class="label" text-anchor="middle">the STaR loop</text><rect width="340" height="56" x="60" y="100" class="cool"/><text x="230" y="124" class="content" text-anchor="middle">1. sample (rationale, answer)</text><text x="230" y="140" class="small" text-anchor="middle">base model, T &gt; 0</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M230 160 L230 180"/><rect width="340" height="56" x="60" y="186" class="hot"/><text x="230" y="210" class="content" text-anchor="middle">2. filter: keep if answer == label</text><text x="230" y="226" class="small" text-anchor="middle">discards incorrect rationales entirely</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M230 246 L230 266"/><rect width="340" height="56" x="60" y="272" class="cool"/><text x="230" y="296" class="content" text-anchor="middle">3. SFT on the kept rationales</text><text x="230" y="312" class="small" text-anchor="middle">teacher forcing on (problem, rationale, answer)</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M230 332 L230 352"/><rect width="340" height="56" x="60" y="358" class="cold"/><text x="230" y="382" class="content" text-anchor="middle">4. rationalize failures</text><text x="230" y="398" class="small" text-anchor="middle">inject answer, re-ask for the rationale</text><path fill="none" stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M60 386 Q 20 386 20 140 Q 20 100 60 128"/><text x="28" y="260" class="small">repeat</text><rect width="340" height="80" x="60" y="438" class="box"/><text x="230" y="458" class="label" text-anchor="middle">what the loop reinforces</text><text x="230" y="478" class="content" text-anchor="middle">sound rationale · right answer</text><text x="230" y="494" class="content" text-anchor="middle">shortcut rationale · right answer</text><text x="230" y="510" class="small" text-anchor="middle">both get kept. filter cannot tell them apart.</text><rect width="410" height="480" x="450" y="56" class="box"/><text x="655" y="80" class="label" text-anchor="middle">three variants, three signal shapes</text><rect width="372" height="106" x="470" y="100" class="cool"/><text x="480" y="122" class="label">STaR (Zelikman 2022)</text><text x="480" y="142" class="content">keep-if-correct filter on generator.</text><text x="480" y="158" class="content">repeat SFT rounds.</text><text x="480" y="174" class="content">GPT-J + STaR ≈ fine-tuned 30x larger model</text><text x="480" y="190" class="content">on GSM8K (no new human labels).</text><rect width="372" height="110" x="470" y="212" class="cold"/><text x="480" y="234" class="label">V-STaR (Hosseini 2024)</text><text x="480" y="254" class="content">DPO-train a verifier on correct AND</text><text x="480" y="270" class="content">incorrect rationales (the STaR waste).</text><text x="480" y="286" class="content">inference: sample N, pick verifier&apos;s top.</text><text x="480" y="302" class="content">+4 to +17 pp over prior self-improve.</text><rect width="372" height="110" x="470" y="328" class="hot"/><text x="480" y="350" class="label">Quiet-STaR (Zelikman 2024)</text><text x="480" y="370" class="content">per-token internal rationale.</text><text x="480" y="386" class="content">end-of-thought token + mixing head.</text><text x="480" y="402" class="content">Mistral 7B GSM8K 5.9% -&gt; 10.9%</text><text x="480" y="418" class="content">no task-specific fine-tune.</text><rect width="372" height="84" x="470" y="444" class="box"/><text x="480" y="466" class="label">shared weakness</text><text x="480" y="486" class="content">all three use answer-conditioned gradient.</text><text x="480" y="502" class="content">shortcut-reasoning reaches the label.</text><text x="480" y="518" class="content">fix: process reward models + OOD eval.</text></svg>