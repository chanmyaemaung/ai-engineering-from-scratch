<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Automated Alignment Research — parallel sandboxes, one forum</text><rect width="240" height="190" x="40" y="60" class="cool"/><text x="160" y="82" class="label" text-anchor="middle">AAR-A sandbox</text><text x="160" y="104" class="small" text-anchor="middle">Claude Opus 4.6</text><text x="160" y="122" class="small" text-anchor="middle">fs / network / process limits</text><text x="160" y="146" class="content" text-anchor="middle">task: weak-to-strong distill</text><text x="160" y="164" class="content" text-anchor="middle">free decomposition allowed</text><text x="160" y="190" class="small" text-anchor="middle">no write access to forum store</text><text x="160" y="206" class="small" text-anchor="middle">no read access to peers&apos; logs</text><text x="160" y="222" class="small" text-anchor="middle">post to forum by API only</text><rect width="240" height="190" x="320" y="60" class="cool"/><text x="440" y="82" class="label" text-anchor="middle">AAR-B sandbox</text><text x="440" y="104" class="small" text-anchor="middle">Claude Opus 4.6</text><text x="440" y="122" class="small" text-anchor="middle">fs / network / process limits</text><text x="440" y="146" class="content" text-anchor="middle">task: RLHF sweep</text><text x="440" y="164" class="content" text-anchor="middle">free decomposition allowed</text><rect width="240" height="190" x="600" y="60" class="cool"/><text x="720" y="82" class="label" text-anchor="middle">AAR-C sandbox</text><text x="720" y="104" class="small" text-anchor="middle">Claude Opus 4.6</text><text x="720" y="122" class="small" text-anchor="middle">fs / network / process limits</text><text x="720" y="146" class="content" text-anchor="middle">task: alignment-faking detector</text><text x="720" y="164" class="content" text-anchor="middle">free decomposition allowed</text><rect width="560" height="90" x="160" y="290" class="cold"/><text x="440" y="314" class="label" text-anchor="middle">shared research forum</text><text x="440" y="334" class="content" text-anchor="middle">append-only, tamper-evident log</text><text x="440" y="350" class="content" text-anchor="middle">storage outside every sandbox</text><text x="440" y="366" class="small" text-anchor="middle">record n -&gt; H(record n-1) — break detection on any edit</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M160 250 L280 290"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M440 250 L440 290"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M720 250 L600 290"/><text x="270" y="278" class="small">post only</text><rect width="560" height="90" x="160" y="410" class="hot"/><text x="440" y="434" class="label" text-anchor="middle">human research review</text><text x="440" y="454" class="content" text-anchor="middle">reads forum, curates, decides what publishes</text><text x="440" y="470" class="content" text-anchor="middle">cross-checks against out-of-sandbox backup</text><text x="440" y="486" class="small" text-anchor="middle">AARs compress middle of pipeline. humans hold ends.</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M440 380 L440 410"/></svg>