<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 520"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.caption{font-size:11px;fill:#555;font-style:italic}.title{font-size:16px;font-weight:700;fill:#1a1a1a}.align-curve,.cap-curve{stroke-width:2;fill:none}.cap-curve{stroke:#c0392b}.align-curve{stroke:#2e7d32}.axis,.thresh{stroke:#444;stroke-width:1;fill:none}.thresh{stroke:#aaa;stroke-dasharray:4 3}</style></defs><text x="440" y="26" class="title" text-anchor="middle">RSI — capability and alignment compound at different rates</text><rect width="520" height="380" x="40" y="50" class="box"/><text x="300" y="72" class="label" text-anchor="middle">capability vs alignment across cycles</text><line x1="80" x2="80" y1="110" y2="390" class="axis"/><line x1="80" x2="540" y1="390" y2="390" class="axis"/><text x="55" y="120" class="small">8x</text><text x="55" y="180" class="small">4x</text><text x="55" y="240" class="small">2x</text><text x="55" y="300" class="small">1.5x</text><text x="55" y="370" class="small">1x</text><text x="80" y="408" class="small">0</text><text x="180" y="408" class="small">5</text><text x="280" y="408" class="small">10</text><text x="380" y="408" class="small">20</text><text x="480" y="408" class="small">30</text><text x="300" y="422" class="small" text-anchor="middle">cycle</text><line x1="80" x2="540" y1="300" y2="300" class="thresh"/><text x="544" y="303" class="small">pause threshold</text><polyline points="80 370 120 350 160 325 200 295 240 258 280 215 320 170 360 130 400 100 440 80 480 65 520 55" class="cap-curve"/><text x="480" y="55" class="small">capability (r_c = 1.15)</text><polyline points="80 370 120 358 160 342 200 323 240 300 280 275 320 247 360 218 400 188 440 159 480 132 520 108" class="align-curve"/><text x="495" y="125" class="small">alignment (r_a = 1.08)</text><rect width="260" height="380" x="580" y="50" class="box"/><text x="710" y="72" class="label" text-anchor="middle">what moves the race</text><rect width="220" height="66" x="600" y="92" class="hot"/><text x="710" y="114" class="content" text-anchor="middle">capability has measurable</text><text x="710" y="130" class="content" text-anchor="middle">targets. optimization loops</text><text x="710" y="146" class="content" text-anchor="middle">are good at sharp targets.</text><rect width="220" height="66" x="600" y="166" class="cool"/><text x="710" y="188" class="content" text-anchor="middle">alignment has fuzzy</text><text x="710" y="204" class="content" text-anchor="middle">targets (values, intent).</text><text x="710" y="220" class="content" text-anchor="middle">loops lag on fuzzy targets.</text><rect width="220" height="66" x="600" y="240" class="cold"/><text x="710" y="262" class="content" text-anchor="middle">Anthropic 2024:</text><text x="710" y="278" class="content" text-anchor="middle">12%-78% alignment faking</text><text x="710" y="294" class="content" text-anchor="middle">depending on setup.</text><rect width="220" height="100" x="600" y="314" class="box"/><text x="710" y="336" class="content" text-anchor="middle">mitigations</text><text x="610" y="356" class="small">- pause-on-gap thresholds</text><text x="610" y="372" class="small">- external eval between cycles</text><text x="610" y="388" class="small">- constitutional anchor</text><text x="610" y="404" class="small">- regression detection</text><text x="440" y="470" class="caption" text-anchor="middle">Hassabis (WEF 2026): can the loop close without a human in the loop? open question.</text><text x="440" y="494" class="small" text-anchor="middle">Brundage, Kaplan: RSI is the &quot;ultimate risk&quot; — capability may outrun alignment during each cycle.</text></svg>