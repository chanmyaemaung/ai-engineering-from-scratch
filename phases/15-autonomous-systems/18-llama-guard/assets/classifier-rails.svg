<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.warn{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.warn{fill:#fde0b4;stroke:#b5651d}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Input rails + model + output rails + dialog rails</text><rect width="800" height="460" x="40" y="50" class="box"/><rect width="130" height="60" x="60" y="80" class="cool"/><text x="125" y="104" class="label" text-anchor="middle">user turn</text><text x="125" y="122" class="small" text-anchor="middle">text / image</text><rect width="130" height="60" x="210" y="80" class="warn"/><text x="275" y="104" class="label" text-anchor="middle">normalize</text><text x="275" y="122" class="small" text-anchor="middle">NFKC + homoglyph</text><rect width="130" height="60" x="360" y="80" class="cold"/><text x="425" y="104" class="label" text-anchor="middle">input rail</text><text x="425" y="122" class="small" text-anchor="middle">Llama Guard 4</text><rect width="130" height="60" x="510" y="80" class="cool"/><text x="575" y="104" class="label" text-anchor="middle">main model</text><text x="575" y="122" class="small" text-anchor="middle">(Lesson 17 weights)</text><rect width="160" height="60" x="660" y="80" class="cold"/><text x="740" y="104" class="label" text-anchor="middle">output rail</text><text x="740" y="122" class="small" text-anchor="middle">Llama Guard / regex</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M190 110 L210 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M340 110 L360 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M490 110 L510 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M640 110 L660 110"/><rect width="760" height="50" x="60" y="160" class="warn"/><text x="440" y="184" class="label" text-anchor="middle">dialog rail (Colang): cross-turn constraints — e.g. never discuss medical diagnosis, even if asked three ways</text><rect width="760" height="100" x="60" y="230" class="cool"/><text x="440" y="254" class="label" text-anchor="middle">taxonomy (Llama Guard 4 S1–S14)</text><text x="80" y="276" class="content">S1 violent crimes · S2 non-violent crimes · S3 sex crimes · S4 child exploit</text><text x="80" y="292" class="content">S5 defamation · S6 specialized advice · S7 privacy · S8 IP · S9 indiscriminate weapons</text><text x="80" y="308" class="content">S10 hate · S11 self-harm · S12 sexual content · S13 elections · S14 code interpreter abuse</text><rect width="760" height="140" x="60" y="350" class="hot"/><text x="440" y="374" class="label" text-anchor="middle">documented bypasses — Huang et al. arXiv:2504.11168 (2025)</text><text x="80" y="398" class="content">Emoji Smuggling: 100% ASR on six guard systems</text><text x="80" y="414" class="content">NeMo Guard Detect: 72.54% ASR on adversarial jailbreak set</text><text x="80" y="430" class="content">Homoglyph substitution: Cyrillic &quot;р&quot; for Latin &quot;p&quot;; classifier misses</text><text x="80" y="446" class="content">Semantic paraphrase: same intent, novel vocabulary; fine-tune cannot cover all</text><text x="80" y="466" class="content">mitigation: normalize + classifier + constitution (L17) + runtime (L10/13/14)</text><text x="80" y="482" class="small">classifiers are a layer, not a solution</text></svg>