<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Indirect prompt injection: attack surface and defense layers</text><rect width="800" height="460" x="40" y="50" class="box"/><rect width="200" height="120" x="60" y="80" class="hot"/><text x="160" y="102" class="label" text-anchor="middle">out-of-trust content</text><text x="76" y="128" class="small">• any third-party page</text><text x="76" y="144" class="small">• user-generated posts</text><text x="76" y="160" class="small">• search-engine snippets</text><text x="76" y="176" class="small">• URL fragment / query</text><text x="76" y="192" class="small">• prior memory entries</text><rect width="240" height="120" x="320" y="80" class="cool"/><text x="440" y="102" class="label" text-anchor="middle">browser agent</text><text x="336" y="128" class="small">read + reason + act loop</text><text x="336" y="144" class="small">tool allowlist per task</text><text x="336" y="160" class="small">scoped credentials only</text><text x="336" y="176" class="small">session-isolated workspace</text><text x="336" y="192" class="small">logs retained for audit</text><rect width="200" height="120" x="620" y="80" class="cold"/><text x="720" y="102" class="label" text-anchor="middle">consequential sinks</text><text x="636" y="128" class="small">• form submits</text><text x="636" y="144" class="small">• backend tool calls</text><text x="636" y="160" class="small">• memory writes</text><text x="636" y="176" class="small">• file downloads</text><text x="636" y="192" class="small">• credential use</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M260 140 L320 140"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M560 140 L620 140"/><text x="60" y="230" class="label">defense layers</text><rect width="240" height="100" x="60" y="240" class="cool"/><text x="180" y="262" class="label" text-anchor="middle">1. content sanitizer</text><text x="76" y="284" class="small">strip known-bad patterns</text><text x="76" y="300" class="small">&quot;ignore previous&quot;, &quot;post to&quot;</text><text x="76" y="316" class="small">catches visible-text injection</text><text x="76" y="332" class="small">MISSES URL-fragment payloads</text><rect width="240" height="100" x="320" y="240" class="cold"/><text x="440" y="262" class="label" text-anchor="middle">2. R/W boundary</text><text x="336" y="284" class="small">reads free; writes require</text><text x="336" y="300" class="small">fresh approval when</text><text x="336" y="316" class="small">content_origin = out-of-trust</text><text x="336" y="332" class="small">catches fragment injection too</text><rect width="240" height="100" x="580" y="240" class="hot"/><text x="700" y="262" class="label" text-anchor="middle">3. tool allowlist + HITL</text><text x="596" y="284" class="small">tool allowlist per task</text><text x="596" y="300" class="small">HITL on irreversible writes</text><text x="596" y="316" class="small">propose-then-commit (L15)</text><text x="596" y="332" class="small">canary tokens on memory (L14)</text><rect width="760" height="130" x="60" y="360" class="hot"/><text x="440" y="384" class="label" text-anchor="middle">documented 2025–2026 attacks</text><text x="80" y="406" class="content">Tainted Memories (Atlas CSRF, 2025) — attacker page binds instructions to the agent&apos;s memory</text><text x="80" y="422" class="content">HashJack (Cato Networks, 2026) — payload hidden in URL fragment / query string</text><text x="80" y="438" class="content">Perplexity Comet hijacks (2026) — one-click button rides follow-on payload</text><text x="80" y="458" class="content">OpenAI preparedness head (2025): indirect prompt injection &quot;is not a bug that can be fully patched&quot;</text><text x="80" y="478" class="small">defense-in-depth: sanitizer + R/W boundary + allowlist + HITL + canaries; any single layer insufficient</text></svg>