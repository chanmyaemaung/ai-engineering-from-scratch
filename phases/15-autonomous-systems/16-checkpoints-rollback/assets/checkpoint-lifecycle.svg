<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.warn{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.warn{fill:#fde0b4;stroke:#b5651d}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Checkpoint lifecycle: idempotency + precondition + verify + rollback</text><rect width="800" height="460" x="40" y="50" class="box"/><rect width="160" height="60" x="60" y="80" class="cool"/><text x="140" y="104" class="label" text-anchor="middle">approved action</text><text x="140" y="122" class="small" text-anchor="middle">idempotency key k</text><rect width="160" height="60" x="240" y="80" class="cold"/><text x="320" y="104" class="label" text-anchor="middle">precondition check</text><text x="320" y="122" class="small" text-anchor="middle">state still consistent?</text><rect width="180" height="60" x="420" y="80" class="warn"/><text x="510" y="104" class="label" text-anchor="middle">mark-as-done-first</text><text x="510" y="122" class="small" text-anchor="middle">persist &quot;committed&quot; BEFORE exec</text><rect width="180" height="60" x="620" y="80" class="hot"/><text x="710" y="104" class="label" text-anchor="middle">execute side effect</text><text x="710" y="122" class="small" text-anchor="middle">tool call / DB write / send</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M220 110 L240 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M400 110 L420 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M600 110 L620 110"/><rect width="160" height="60" x="60" y="180" class="cool"/><text x="140" y="204" class="label" text-anchor="middle">post-action verify</text><text x="140" y="222" class="small" text-anchor="middle">re-read target resource</text><rect width="160" height="60" x="240" y="180" class="cool"/><text x="320" y="204" class="label" text-anchor="middle">verify passes</text><text x="320" y="222" class="small" text-anchor="middle">done</text><rect width="180" height="60" x="420" y="180" class="hot"/><text x="510" y="204" class="label" text-anchor="middle">verify fails</text><text x="510" y="222" class="small" text-anchor="middle">known-bad state detected</text><rect width="180" height="60" x="620" y="180" class="hot"/><text x="710" y="204" class="label" text-anchor="middle">rollback fires</text><text x="710" y="222" class="small" text-anchor="middle">in-band / compensating / alert</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M220 210 L240 210"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M600 210 L620 210"/><rect width="760" height="100" x="60" y="270" class="hot"/><text x="440" y="294" class="label" text-anchor="middle">the sharp failure: double-execute on retry after crash</text><text x="80" y="316" class="content">1. commit starts · 2. execute succeeds · 3. crash before persisting &quot;committed&quot;</text><text x="80" y="332" class="content">4. resume, sees &quot;approved not committed&quot; · 5. re-executes · 6. side effect fires twice</text><text x="80" y="352" class="content">mitigation: persist &quot;committed&quot; BEFORE execute (&quot;mark-as-done-first&quot; pattern)</text><rect width="760" height="90" x="60" y="400" class="cold"/><text x="440" y="424" class="label" text-anchor="middle">EU AI Act Article 14 — operational reading</text><text x="80" y="446" class="content">checkpoints queryable (auditor access, not just logs)</text><text x="80" y="462" class="content">rollbacks rehearsed (end-to-end test, not documented intent)</text><text x="80" y="478" class="content">audit trail survives deploys (PostgreSQL or Durable Objects, not in-memory)</text></svg>