<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.cool,.hot,.warn{stroke-width:1.5}.warn{fill:#fde0b4;stroke:#b5651d}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Three scaling policies, same capability, three classifications</text><rect width="800" height="460" x="40" y="50" class="box"/><rect width="250" height="36" x="60" y="80" class="cool"/><text x="185" y="104" class="label" text-anchor="middle">OpenAI PF v2 (Apr 2025)</text><rect width="240" height="36" x="320" y="80" class="cold"/><text x="440" y="104" class="label" text-anchor="middle">Anthropic RSP v3.0 (Feb 2026)</text><rect width="250" height="36" x="570" y="80" class="warn"/><text x="695" y="104" class="label" text-anchor="middle">DeepMind FSF v3 (Sept 2025 + Apr 2026)</text><rect width="760" height="46" x="60" y="130" class="box"/><text x="76" y="152" class="label">long-range autonomy</text><text x="76" y="170" class="content">OpenAI: Research (not triggering) · Anthropic: named; affirmative case at threshold · DeepMind: folded into ML R&amp;D / Cyber</text><rect width="760" height="46" x="60" y="184" class="box"/><text x="76" y="206" class="label">undermining safeguards</text><text x="76" y="224" class="content">OpenAI: Research · Anthropic: hardcoded prohibition (refusal) · DeepMind: deceptive-alignment monitoring</text><rect width="760" height="46" x="60" y="238" class="box"/><text x="76" y="260" class="label">R&amp;D automation</text><text x="76" y="278" class="content">OpenAI: Tracked · Anthropic: AI R&amp;D-4 threshold (affirmative case) · DeepMind: ML R&amp;D autonomy level 1 (TCL, Apr 2026)</text><rect width="760" height="46" x="60" y="292" class="box"/><text x="76" y="314" class="label">sandbagging</text><text x="76" y="332" class="content">OpenAI: Research · Anthropic: addressed via eval-context gap · DeepMind: deceptive-alignment monitoring (instrumental reasoning)</text><rect width="760" height="46" x="60" y="346" class="box"/><text x="76" y="368" class="label">cyber uplift</text><text x="76" y="386" class="content">OpenAI: Tracked · Anthropic: ASL-3 trigger (security + deployment) · DeepMind: Cyber CCL</text><rect width="760" height="90" x="60" y="400" class="hot"/><text x="440" y="424" class="label" text-anchor="middle">convergence + divergence</text><text x="80" y="446" class="content">converge: internal SAG, deceptive-alignment as a named risk class, standing artifacts</text><text x="80" y="462" class="content">diverge: Tracked vs Research split only in PF v2; DeepMind folds autonomy; Anthropic removed pause clause</text><text x="80" y="478" class="content">measurement dependency: all three frameworks work only if the capability measurement is not gameable</text></svg>