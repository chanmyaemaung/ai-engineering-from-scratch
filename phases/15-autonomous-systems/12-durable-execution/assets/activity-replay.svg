<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Durable execution: replay re-runs workflow, logged activities skip</text><rect width="800" height="460" x="40" y="50" class="box"/><text x="60" y="80" class="label">attempt 1 — crash after call_llm</text><rect width="150" height="50" x="60" y="96" class="cool"/><text x="135" y="118" class="label" text-anchor="middle">fetch_docs</text><text x="135" y="136" class="small" text-anchor="middle">run, log done</text><rect width="150" height="50" x="230" y="96" class="cool"/><text x="305" y="118" class="label" text-anchor="middle">call_llm</text><text x="305" y="136" class="small" text-anchor="middle">run, log done</text><rect width="150" height="50" x="400" y="96" class="hot"/><text x="475" y="118" class="label" text-anchor="middle">CRASH</text><text x="475" y="136" class="small" text-anchor="middle">write_report not yet run</text><rect width="490" height="74" x="60" y="170" class="cold"/><text x="80" y="192" class="label">event log (durable)</text><text x="80" y="212" class="content">[fetch_docs started, fetch_docs done (result=X),</text><text x="80" y="228" class="content">call_llm started, call_llm done (result=Y)]</text><text x="60" y="276" class="label">attempt 2 — replay</text><rect width="150" height="50" x="60" y="292" class="cold"/><text x="135" y="314" class="label" text-anchor="middle">fetch_docs</text><text x="135" y="332" class="small" text-anchor="middle">replay from log</text><rect width="150" height="50" x="230" y="292" class="cold"/><text x="305" y="314" class="label" text-anchor="middle">call_llm</text><text x="305" y="332" class="small" text-anchor="middle">replay from log</text><rect width="150" height="50" x="400" y="292" class="cool"/><text x="475" y="314" class="label" text-anchor="middle">write_report</text><text x="475" y="332" class="small" text-anchor="middle">run, log done</text><rect width="150" height="50" x="570" y="292" class="box"/><text x="645" y="314" class="label" text-anchor="middle">return report</text><text x="645" y="332" class="small" text-anchor="middle">done</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M210 317 L230 317"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M380 317 L400 317"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M550 317 L570 317"/><rect width="760" height="120" x="60" y="370" class="hot"/><text x="440" y="394" class="label" text-anchor="middle">what makes replay work</text><text x="80" y="416" class="content">1. Workflow code is deterministic (no wall clock, no random, no hidden I/O).</text><text x="80" y="432" class="content">2. Every activity is logged with args + result; replay re-reads the log.</text><text x="80" y="448" class="content">3. Backend survives the crash (PostgreSQL / Durable Objects; not SQLite for prod).</text><text x="80" y="464" class="content">4. HITL pauses are a workflow signal, not a polling loop.</text><text x="80" y="480" class="content">LLM calls fit the activity shape: non-deterministic, expensive, potentially failing.</text></svg>