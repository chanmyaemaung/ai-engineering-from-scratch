<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 540"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.hot,.warn{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.warn{fill:#fde0b4;stroke:#b5651d}.cold{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.dsk{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.dsk{fill:#e9e6ff;stroke:#5a4fcf}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Claude Code permission modes and the Auto Mode classifier</text><rect width="800" height="460" x="40" y="50" class="box"/><text x="60" y="80" class="label">permission ladder (tight -&gt; loose)</text><rect width="130" height="46" x="60" y="96" class="cool"/><text x="125" y="116" class="label" text-anchor="middle">plan</text><text x="125" y="132" class="small" text-anchor="middle">ask before anything</text><rect width="130" height="46" x="200" y="96" class="cold"/><text x="265" y="116" class="label" text-anchor="middle">default</text><text x="265" y="132" class="small" text-anchor="middle">ask on risky ops</text><rect width="130" height="46" x="340" y="96" class="dsk"/><text x="405" y="116" class="label" text-anchor="middle">acceptEdits</text><text x="405" y="132" class="small" text-anchor="middle">writes auto; exec asks</text><rect width="130" height="46" x="480" y="96" class="warn"/><text x="545" y="116" class="label" text-anchor="middle">autoMode</text><text x="545" y="132" class="small" text-anchor="middle">classifier approves</text><rect width="90" height="46" x="620" y="96" class="hot"/><text x="665" y="116" class="label" text-anchor="middle">yolo</text><text x="665" y="132" class="small" text-anchor="middle">ephemeral only</text><rect width="110" height="46" x="720" y="96" class="hot"/><text x="775" y="116" class="label" text-anchor="middle">bypassPermissions</text><text x="775" y="132" class="small" text-anchor="middle">throwaway sandbox</text><rect width="770" height="200" x="60" y="170" class="box"/><text x="445" y="192" class="label" text-anchor="middle">Auto Mode (March 24, 2026) — two-stage safety classifier</text><rect width="180" height="110" x="80" y="210" class="cool"/><text x="170" y="232" class="label" text-anchor="middle">proposed action</text><text x="170" y="252" class="small" text-anchor="middle">tool + payload</text><text x="170" y="270" class="small" text-anchor="middle">from agent loop</text><rect width="180" height="110" x="290" y="210" class="warn"/><text x="380" y="232" class="label" text-anchor="middle">Stage 1 classifier</text><text x="380" y="252" class="small" text-anchor="middle">single-token check</text><text x="380" y="270" class="small" text-anchor="middle">runs in parallel</text><text x="380" y="288" class="small" text-anchor="middle">cheap, keyword rule</text><rect width="180" height="110" x="500" y="210" class="hot"/><text x="590" y="232" class="label" text-anchor="middle">Stage 2 review</text><text x="590" y="252" class="small" text-anchor="middle">chain-of-thought</text><text x="590" y="270" class="small" text-anchor="middle">trajectory context</text><text x="590" y="288" class="small" text-anchor="middle">(only on flags)</text><rect width="120" height="110" x="710" y="210" class="cold"/><text x="770" y="232" class="label" text-anchor="middle">HITL</text><text x="770" y="252" class="small" text-anchor="middle">low confidence</text><text x="770" y="270" class="small" text-anchor="middle">escalation</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M260 265 L290 265"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M470 265 L500 265"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M680 265 L710 265"/><text x="380" y="340" class="small" text-anchor="middle">not flagged -&gt; execute immediately</text><text x="590" y="340" class="small" text-anchor="middle">hard-block on priv-esc / exfil shapes</text><rect width="770" height="100" x="60" y="390" class="hot"/><text x="445" y="412" class="label" text-anchor="middle">budget controls are non-negotiable (Lesson 13)</text><text x="80" y="434" class="content">max_turns = hard cap on agent loop iterations</text><text x="80" y="450" class="content">max_budget_usd = dollar kill switch; aborts session on breach</text><text x="80" y="466" class="content">per-tool caps = e.g. no more than N WebFetch calls per session</text><text x="80" y="482" class="small">Anthropic shipped Auto Mode as a research preview; classifier is a layer, not a solution.</text></svg>