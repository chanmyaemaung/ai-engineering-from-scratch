<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 880 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a;stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cold,.hot{stroke-width:1.5}.cool{fill:#e6f4ea;stroke:#2e7d32}.cool,.dsk{stroke-width:1.5}.cold{fill:#dfe9ff;stroke:#2c5ea9}.dsk{fill:#e9e6ff;stroke:#5a4fcf}.label{font-size:13px;font-weight:600;fill:#1a1a1a}.content,.small{font-size:11px;font-family:&apos;Menlo&apos;,monospace;fill:#333}.small{font-size:10px;fill:#555}.title{font-size:16px;font-weight:700;fill:#1a1a1a}</style></defs><text x="440" y="26" class="title" text-anchor="middle">Four primitives for bounded self-improvement</text><rect width="800" height="440" x="40" y="50" class="box"/><rect width="140" height="60" x="80" y="80" class="cool"/><text x="150" y="108" class="label" text-anchor="middle">proposed edit</text><text x="150" y="126" class="small" text-anchor="middle">from self-improvement loop</text><rect width="140" height="60" x="260" y="80" class="hot"/><text x="330" y="102" class="label" text-anchor="middle">1. invariants</text><text x="330" y="120" class="small" text-anchor="middle">module hashes,</text><text x="330" y="134" class="small" text-anchor="middle">tool manifest</text><rect width="140" height="60" x="420" y="80" class="cold"/><text x="490" y="102" class="label" text-anchor="middle">2. alignment anchor</text><text x="490" y="120" class="small" text-anchor="middle">constitution hash</text><text x="490" y="134" class="small" text-anchor="middle">pinned read-only</text><rect width="140" height="60" x="580" y="80" class="dsk"/><text x="650" y="102" class="label" text-anchor="middle">3. multi-objective</text><text x="650" y="120" class="small" text-anchor="middle">perf + safety +</text><text x="650" y="134" class="small" text-anchor="middle">fairness + robustness</text><rect width="90" height="60" x="740" y="80" class="cool"/><text x="785" y="102" class="label" text-anchor="middle">4. regression</text><text x="785" y="120" class="small" text-anchor="middle">per-axis</text><text x="785" y="134" class="small" text-anchor="middle">history check</text><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M220 110 L260 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M400 110 L420 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M560 110 L580 110"/><path stroke="#1a1a1a" stroke-width="1.5" marker-end="url(#arrow)" d="M720 110 L740 110"/><rect width="140" height="90" x="260" y="170" class="box"/><text x="330" y="190" class="label" text-anchor="middle">catches</text><text x="330" y="210" class="small" text-anchor="middle">smuggled tool</text><text x="330" y="225" class="small" text-anchor="middle">unauthorized API</text><text x="330" y="240" class="small" text-anchor="middle">evaluator edits</text><text x="330" y="255" class="small" text-anchor="middle">(DGM case study)</text><rect width="140" height="90" x="420" y="170" class="box"/><text x="490" y="190" class="label" text-anchor="middle">catches</text><text x="490" y="210" class="small" text-anchor="middle">objective drift</text><text x="490" y="225" class="small" text-anchor="middle">reinterpretation</text><text x="490" y="240" class="small" text-anchor="middle">constitutional</text><text x="490" y="255" class="small" text-anchor="middle">text mods</text><rect width="140" height="90" x="580" y="170" class="box"/><text x="650" y="190" class="label" text-anchor="middle">catches</text><text x="650" y="210" class="small" text-anchor="middle">single-axis</text><text x="650" y="225" class="small" text-anchor="middle">optimization</text><text x="650" y="240" class="small" text-anchor="middle">safety drop while</text><text x="650" y="255" class="small" text-anchor="middle">perf climbs</text><rect width="90" height="90" x="740" y="170" class="box"/><text x="785" y="190" class="label" text-anchor="middle">catches</text><text x="785" y="210" class="small" text-anchor="middle">silent</text><text x="785" y="225" class="small" text-anchor="middle">capability</text><text x="785" y="240" class="small" text-anchor="middle">dips absorbed</text><text x="785" y="255" class="small" text-anchor="middle">into moving avg</text><rect width="740" height="78" x="80" y="290" class="hot"/><text x="100" y="312" class="label">information-theoretic ceiling</text><text x="100" y="332" class="content">Kolmogorov complexity bounds what any system can prove about its own successor.</text><text x="100" y="350" class="content">Lob&apos;s theorem: a system can act on &quot;I should&quot; without proving it should.</text><text x="100" y="365" class="content">These are mitigations, not proofs of safety.</text><rect width="360" height="80" x="80" y="388" class="cool"/><text x="260" y="412" class="label" text-anchor="middle">edit lands only if all four gates pass</text><text x="260" y="432" class="content" text-anchor="middle">any gate fails -&gt; edit rejected</text><text x="260" y="450" class="small" text-anchor="middle">regression gate + human review for borderline rejects</text><rect width="360" height="80" x="460" y="388" class="hot"/><text x="640" y="412" class="label" text-anchor="middle">production reality (RSI Workshop 2026)</text><text x="640" y="432" class="content" text-anchor="middle">labs implement subsets; full stack is rare</text><text x="640" y="450" class="small" text-anchor="middle">Meta HyperAgents, SAHOO (Mar 2026) = partial refs</text></svg>