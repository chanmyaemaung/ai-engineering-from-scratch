<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 560"><defs><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cool,.dsk,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.dsk{fill:#e9e6ff;stroke:#5a4fcf}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{font-size:10px;fill:#555}.caption{font-size:11px;font-style:italic}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:12px}</style></defs><text x="480" y="24" class="title" text-anchor="middle">video understanding pipeline — scene -&gt; multi-vector -&gt; grounded answer</text><rect width="880" height="100" x="40" y="50" class="box"/><text x="480" y="70" class="head" text-anchor="middle">ingest (three pipelines in parallel)</text><rect width="270" height="52" x="60" y="84" class="cool"/><text x="195" y="104" class="step" text-anchor="middle">scene segmentation</text><text x="195" y="122" class="small" text-anchor="middle">TransNetV2 / PySceneDetect</text><rect width="270" height="52" x="345" y="84" class="cool"/><text x="480" y="104" class="step" text-anchor="middle">VLM caption + frame embed</text><text x="480" y="122" class="small" text-anchor="middle">Gemini 2.5 Pro / Qwen3-VL / Molmo 2</text><rect width="270" height="52" x="630" y="84" class="cool"/><text x="765" y="104" class="step" text-anchor="middle">ASR + word timestamps</text><text x="765" y="122" class="small" text-anchor="middle">Whisper-v3-turbo (faster-whisper)</text><rect width="880" height="80" x="40" y="170" class="dsk"/><text x="480" y="190" class="head" text-anchor="middle">multi-vector Qdrant index (three named vectors per scene)</text><text x="480" y="214" class="small" text-anchor="middle">caption_emb frame_emb transcript_emb</text><text x="480" y="232" class="small" text-anchor="middle">payload: video_id, scene_id, start_ms, end_ms, keyframe_url</text><rect width="440" height="240" x="40" y="270" class="box"/><text x="260" y="292" class="head" text-anchor="middle">query flow</text><rect width="400" height="30" x="60" y="310" class="cool"/><text x="260" y="330" class="step" text-anchor="middle">three parallel dense queries</text><rect width="400" height="30" x="60" y="346" class="cool"/><text x="260" y="366" class="step" text-anchor="middle">reciprocal rank fusion -&gt; top-k scenes</text><rect width="400" height="30" x="60" y="382" class="hot"/><text x="260" y="402" class="step" text-anchor="middle">temporal grounding (TimeLens / VideoITG)</text><rect width="400" height="30" x="60" y="418" class="dsk"/><text x="260" y="438" class="step" text-anchor="middle">VLM synth with cited timestamps</text><text x="260" y="466" class="small" text-anchor="middle">answer + (start, end) + frame previews</text><text x="260" y="484" class="caption" text-anchor="middle">UI: jump-to-frame + thumbnail strip</text><rect width="400" height="240" x="520" y="270" class="box"/><text x="720" y="292" class="head" text-anchor="middle">evaluation</text><rect width="360" height="30" x="540" y="310" class="cool"/><text x="720" y="330" class="step" text-anchor="middle">ActivityNet-QA + NeXT-GQA</text><rect width="360" height="30" x="540" y="346" class="cool"/><text x="720" y="366" class="step" text-anchor="middle">custom 100-query hand-labeled set</text><rect width="360" height="30" x="540" y="382" class="hot"/><text x="720" y="402" class="step" text-anchor="middle">hallucination sub-bench</text><text x="720" y="420" class="small" text-anchor="middle">counting + action-type reported separately</text><text x="720" y="440" class="small" text-anchor="middle">temporal IoU on held-out grounding set</text><text x="720" y="466" class="small" text-anchor="middle">ingest throughput: hours-of-video / $</text><text x="720" y="488" class="caption" text-anchor="middle">target: 100 hours indexed, &lt; 2 min per query</text></svg>