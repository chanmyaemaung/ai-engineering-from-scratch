<svg xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif" viewBox="0 0 960 520"><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#1a1a1a" d="M0,0 L10,5 L0,10 z"/></marker><style>.box{fill:#faf6ef;stroke:#1a1a1a}.box,.cold,.cool,.hot{stroke-width:1.5}.hot{fill:#fff1d6;stroke:#c0392b}.cool{fill:#e6f4ea;stroke:#2e7d32}.cold{fill:#dfe9ff;stroke:#2c5ea9}.head,.title{font-weight:700;fill:#1a1a1a}.title{font-size:16px}.head{font-size:13px}.small,.step{font-family:&apos;Menlo&apos;,monospace}.step{font-size:12px;fill:#222}.caption,.small{fill:#555}.small{font-size:10px}.caption{font-size:11px;font-style:italic}</style></defs><text x="480" y="28" class="title" text-anchor="middle">Generative agents — three components from Park et al. 2023</text><rect width="280" height="220" x="40" y="60" class="cool"/><text x="180" y="84" class="head" text-anchor="middle">memory stream</text><text x="180" y="108" class="step" text-anchor="middle">append-only log</text><text x="60" y="136" class="small">[t=0] observation :: saw Isabella</text><text x="60" y="154" class="small">[t=1] observation :: invited to party</text><text x="60" y="172" class="small">[t=2] reflection :: I enjoy parties</text><text x="60" y="190" class="small">[t=3] plan :: attend at 5pm</text><text x="60" y="208" class="small">[t=4] action :: head to cafe</text><text x="180" y="240" class="caption" text-anchor="middle">retrieval: recency + importance + relevance</text><text x="180" y="258" class="caption" text-anchor="middle">top-k feeds prompts</text><rect width="280" height="220" x="340" y="60" class="cold"/><text x="480" y="84" class="head" text-anchor="middle">reflection</text><text x="480" y="108" class="step" text-anchor="middle">higher-order beliefs</text><text x="480" y="136" class="small" text-anchor="middle">periodic trigger:</text><text x="480" y="154" class="small" text-anchor="middle">unprocessed importance &gt; threshold</text><text x="480" y="180" class="small" text-anchor="middle">prompt: &quot;given recent memories,</text><text x="480" y="196" class="small" text-anchor="middle">what is a higher-level insight?&quot;</text><text x="480" y="222" class="small" text-anchor="middle">output: new reflection entries</text><text x="480" y="240" class="small" text-anchor="middle">re-ingested into the stream</text><text x="480" y="258" class="caption" text-anchor="middle">without reflection: no belief formation</text><rect width="280" height="220" x="640" y="60" class="box"/><text x="780" y="84" class="head" text-anchor="middle">plan</text><text x="780" y="108" class="step" text-anchor="middle">day / hour / action</text><text x="780" y="136" class="small" text-anchor="middle">day: go to work, have dinner</text><text x="780" y="156" class="small" text-anchor="middle">hour: 9am cafe, 12pm lunch...</text><text x="780" y="176" class="small" text-anchor="middle">action: walk to cafe, order coffee</text><text x="780" y="206" class="small" text-anchor="middle">revision trigger:</text><text x="780" y="222" class="small" text-anchor="middle">observation contradicts plan</text><text x="780" y="240" class="small" text-anchor="middle">only affected segment re-plans</text><text x="780" y="258" class="caption" text-anchor="middle">without plan: reactive noise</text><rect width="880" height="200" x="40" y="310" class="hot"/><text x="480" y="334" class="head" text-anchor="middle">emergent behavior — Valentine&apos;s Day party</text><text x="70" y="362" class="step">tick 0</text><text x="140" y="362" class="small">agent-0 (Isabella) is seeded with: &quot;host party at cafe, 5pm&quot;</text><text x="70" y="382" class="step">tick 0-2</text><text x="140" y="382" class="small">Isabella invites neighbors; each invitation becomes an observation in their stream</text><text x="70" y="402" class="step">tick 1-3</text><text x="140" y="402" class="small">invited neighbors reflect -&gt; belief &quot;I am invited to a party&quot; -&gt; plan to attend</text><text x="70" y="422" class="step">tick 2-4</text><text x="140" y="422" class="small">invitees tell other neighbors; second-degree spread</text><text x="70" y="442" class="step">tick 5</text><text x="140" y="442" class="small">three components converge: 3-5 agents arrive at the cafe on time</text><text x="70" y="470" class="caption">single seed + three components = coordinated arrival without an orchestrator</text><text x="70" y="490" class="caption">documented failures: spatial norms (closed stores, single-person bathrooms)</text></svg>